<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Fetch</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="stylesheet" href="https://unpkg.com/@blueprintjs/icons@5/lib/css/blueprint-icons.css" />
    <link rel="stylesheet" href="https://unpkg.com/@blueprintjs/core@5/lib/css/blueprint.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mr+Dafoe&family=Rajdhani:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --ink: #14212b;
        --muted: #62707b;
        --line: #d8e0e5;
        --bg: #f7f9f8;
        --panel: #ffffff;
        --aqua: #087d8c;
        --coral: #c95d3f;
        --lime: #778b22;
        --sand: #e7d29c;
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: max(12px, env(safe-area-inset-top)) 16px 12px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.92);
        position: sticky;
        top: 0;
        z-index: 4;
        backdrop-filter: blur(12px);
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      .status {
        min-width: 96px;
        padding: 6px 9px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--muted);
        font-size: 12px;
        text-align: center;
        background: #fff;
      }

      main {
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) minmax(280px, 0.9fr);
        gap: 16px;
        padding: 16px;
      }

      .stage {
        display: grid;
        gap: 12px;
        min-width: 0;
      }

      .video-shell {
        position: relative;
        overflow: hidden;
        border-radius: 8px;
        background: #0f171a;
        aspect-ratio: 4 / 3;
        border: 1px solid #0f171a;
      }

      video,
      .dog-preview,
      .dog-lidar-preview,
      .record3d-preview,
      .depth-preview,
      .photo img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .rgbd-grid,
      .dog-grid,
      .dog-preview,
      .dog-lidar-preview,
      .record3d-preview,
      .depth-preview {
        display: none;
      }

      body.record3d-mode video {
        display: none;
      }

      body.dog-mode video,
      body.dog-mode .rgbd-grid,
      body.dog-mode .idle-feed {
        display: none;
      }

      body.dog-mode .dog-grid {
        display: grid;
      }

      body.dog-mode .dog-preview,
      body.dog-mode .dog-lidar-preview {
        display: block;
      }

      body.record3d-mode .rgbd-grid {
        display: grid;
      }

      body.record3d-mode .record3d-preview,
      body.record3d-mode .depth-preview {
        display: block;
      }

      .video-overlay {
        position: absolute;
        left: 12px;
        bottom: 12px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .chip {
        border-radius: 8px;
        padding: 6px 8px;
        background: rgba(255, 255, 255, 0.9);
        color: var(--ink);
        font-size: 12px;
        border: 1px solid rgba(20, 33, 43, 0.12);
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      button {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        font-size: 14px;
        font-weight: 650;
        touch-action: manipulation;
      }

      button.primary {
        background: var(--aqua);
        border-color: var(--aqua);
        color: #fff;
      }

      button.warn {
        border-color: rgba(201, 93, 63, 0.45);
        color: var(--coral);
      }

      button:disabled {
        opacity: 0.55;
      }

      aside {
        display: grid;
        align-content: start;
        gap: 12px;
      }

      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 12px;
      }

      h2 {
        margin: 0 0 10px;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0;
        color: var(--muted);
      }

      dl {
        display: grid;
        grid-template-columns: 94px minmax(0, 1fr);
        gap: 8px 10px;
        margin: 0;
        font-size: 14px;
      }

      dt {
        color: var(--muted);
      }

      dd {
        margin: 0;
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .line {
        margin: 0;
        min-height: 52px;
        font-size: 24px;
        line-height: 1.35;
      }

      .toggles {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-size: 14px;
      }

      label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      input[type="checkbox"] {
        width: 22px;
        height: 22px;
        accent-color: var(--aqua);
      }

      .photo {
        display: grid;
        gap: 8px;
      }

      .photo-frame {
        aspect-ratio: 1 / 1;
        background:
          linear-gradient(#fff 0 0) padding-box,
          linear-gradient(135deg, var(--sand), var(--aqua), var(--coral)) border-box;
        border: 8px solid transparent;
        border-bottom-width: 30px;
        border-radius: 3px;
        overflow: hidden;
      }

      .photo a {
        color: var(--aqua);
        font-size: 14px;
        font-weight: 650;
        text-decoration: none;
      }

      .log {
        max-height: 148px;
        overflow: auto;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      @media (max-width: 820px) {
        main {
          grid-template-columns: 1fr;
          padding: 12px;
        }

        .controls {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      :root {
        color-scheme: dark;
        --ink: oklch(91% 0.018 105);
        --muted: oklch(69% 0.023 175);
        --faint: oklch(49% 0.019 175);
        --line: oklch(32% 0.018 175);
        --line-strong: oklch(45% 0.025 175);
        --bg: oklch(13% 0.012 175);
        --panel: oklch(19.5% 0.017 175);
        --panel-strong: oklch(22% 0.018 175);
        --accent: oklch(72% 0.11 170);
        --accent-ink: oklch(13% 0.018 175);
        --amber: oklch(79% 0.13 78);
        --danger: oklch(67% 0.17 28);
        --ok: oklch(72% 0.14 150);
        --shadow: 0 22px 60px oklch(7% 0.018 175 / 0.48);
        --space-xs: 8px;
        --space-sm: 12px;
        --space-md: 16px;
        --space-lg: 24px;
        --radius: 8px;
        --font-body: "Source Sans 3", "Segoe UI", sans-serif;
        --font-display: "Rajdhani", "Aptos Display", sans-serif;
        --font-logo: "Mr Dafoe", "Brush Script MT", cursive;
      }

      html {
        min-height: 100%;
        background: var(--bg);
      }

      body {
        background:
          radial-gradient(circle at 55% -18%, oklch(35% 0.045 165 / 0.28), transparent 34rem),
          linear-gradient(oklch(18% 0.014 175 / 0.9), oklch(11% 0.012 175 / 0.96)),
          repeating-linear-gradient(
            90deg,
            oklch(100% 0 0 / 0.026) 0,
            oklch(100% 0 0 / 0.026) 1px,
            transparent 1px,
            transparent 46px
          ),
          repeating-linear-gradient(
            0deg,
            oklch(100% 0 0 / 0.018) 0,
            oklch(100% 0 0 / 0.018) 1px,
            transparent 1px,
            transparent 46px
          ),
          var(--bg);
        color: var(--ink);
        font-family: var(--font-body);
        font-size: 15px;
        height: 100dvh;
        overflow: hidden;
      }

      header {
        gap: var(--space-lg);
        padding: max(var(--space-sm), env(safe-area-inset-top)) var(--space-lg) var(--space-sm);
        border-bottom: 1px solid var(--line);
        background: oklch(14% 0.014 175 / 0.88);
        z-index: 8;
        backdrop-filter: blur(18px);
      }

      h1 {
        font-family: var(--font-display);
        font-size: 26px;
        font-weight: 700;
        line-height: 0.95;
      }

      h2 {
        margin: 0;
      }

      .brand {
        display: grid;
        gap: 6px;
        min-width: 0;
        padding-left: 8px;
      }

      .brand-logo {
        display: block;
        width: clamp(64px, 5.5vw, 96px);
        height: auto;
      }

      .eyebrow,
      .panel-title,
      .feed-label,
      dt {
        color: var(--faint);
        font-family: var(--font-display);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.06em;
        line-height: 1;
        text-transform: uppercase;
      }

      .header-metrics {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: var(--space-xs);
        min-width: 0;
      }

      .record-toggle {
        min-width: 112px;
        min-height: 42px;
        padding: 8px 12px;
        border: 1px solid color-mix(in oklch, var(--danger) 78%, transparent);
        border-radius: var(--radius);
        background: oklch(16% 0.016 20 / 0.82);
        color: oklch(91% 0.035 30);
      }

      .record-toggle::before {
        display: inline-block;
        width: 10px;
        height: 10px;
        margin-right: 8px;
        border-radius: 50%;
        background: var(--danger);
        box-shadow: 0 0 0 3px color-mix(in oklch, var(--danger) 24%, transparent);
        content: "";
      }

      .record-toggle[data-running="true"] {
        animation: record-pulse 1.1s ease-in-out infinite;
        background: linear-gradient(180deg, oklch(42% 0.16 28), oklch(27% 0.11 28));
        color: white;
      }

      @keyframes record-pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 color-mix(in oklch, var(--danger) 38%, transparent);
        }
        50% {
          box-shadow: 0 0 0 6px color-mix(in oklch, var(--danger) 0%, transparent);
        }
      }

      .status {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-width: 112px;
        min-height: 42px;
        padding: 8px 12px;
        border: 1px solid var(--line-strong);
        background: oklch(18% 0.018 175);
        color: var(--muted);
        font-family: var(--font-display);
        font-size: 13px;
        font-weight: 700;
        line-height: 1;
        text-transform: uppercase;
      }

      .status::before {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--faint);
        box-shadow: 0 0 0 4px color-mix(in oklch, var(--faint) 18%, transparent);
        content: "";
      }

      .status[data-state~="connected"]::before,
      .status[data-state~="camera"]::before,
      .status[data-state~="running"]::before {
        background: var(--ok);
        box-shadow: 0 0 0 4px color-mix(in oklch, var(--ok) 18%, transparent);
      }

      .status[data-state~="connecting"]::before,
      .status[data-state~="error"]::before,
      .status[data-state~="dog-offline"]::before {
        background: var(--amber);
        box-shadow: 0 0 0 4px color-mix(in oklch, var(--amber) 18%, transparent);
      }

      main {
        grid-template-columns: minmax(0, 1.45fr) minmax(328px, 0.8fr);
        gap: var(--space-lg);
        padding: var(--space-lg);
        height: calc(100dvh - 98px);
        min-height: 0;
        overflow: hidden;
      }

      .stage {
        align-content: start;
        grid-template-rows: minmax(0, 1fr) auto;
        gap: var(--space-sm);
        min-height: 0;
      }

      .stage-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-md);
        min-height: 44px;
        padding: 0 var(--space-xs);
      }

      .feed-meta {
        display: flex;
        align-items: center;
        gap: var(--space-xs);
        min-width: 0;
        color: var(--muted);
        font-size: 13px;
      }

      .feed-meta .bp5-icon {
        color: var(--accent);
      }

      .source-overlay {
        position: absolute;
        top: var(--space-md);
        right: var(--space-md);
        z-index: 6;
        display: inline-flex;
        align-items: center;
        gap: var(--space-xs);
        border: 1px solid color-mix(in oklch, var(--accent) 38%, var(--line));
        border-radius: 8px;
        padding: 7px 10px;
        background: oklch(100% 0.012 190 / 0.82);
        box-shadow: 0 8px 26px oklch(14% 0.03 220 / 0.16);
        color: var(--muted);
        font-size: 14px;
        font-weight: 650;
        backdrop-filter: blur(12px);
      }

      .source-overlay .bp5-icon {
        color: var(--accent);
      }

      .source-overlay[data-state="connected"] .bp5-icon,
      .source-overlay[data-state="camera"] .bp5-icon,
      .source-overlay[data-state="running"] .bp5-icon {
        color: var(--ok);
      }

      .source-overlay[data-state="connecting"] .bp5-icon,
      .source-overlay[data-state="offline"] .bp5-icon,
      .source-overlay[data-state="dog-offline"] .bp5-icon {
        color: var(--amber);
      }

      .source-overlay[data-state="error"] .bp5-icon,
      .source-overlay[data-state="socket-error"] .bp5-icon {
        color: var(--danger);
      }

      .video-shell {
        min-height: 0;
        height: 100%;
        border: 1px solid var(--line-strong);
        border-radius: var(--radius);
        background:
          linear-gradient(135deg, oklch(8% 0.015 175), oklch(14% 0.02 175)),
          var(--bg);
        aspect-ratio: auto;
        box-shadow: var(--shadow);
      }

      .video-shell::before {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        background:
          linear-gradient(90deg, oklch(100% 0 0 / 0.05) 1px, transparent 1px),
          linear-gradient(0deg, oklch(100% 0 0 / 0.045) 1px, transparent 1px);
        background-size: 80px 80px;
        mix-blend-mode: screen;
        opacity: 0.34;
        content: "";
      }

      .video-shell::after {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        border: 1px solid oklch(100% 0 0 / 0.1);
        border-radius: inherit;
        box-shadow: inset 0 0 80px oklch(0% 0 0 / 0.46);
        content: "";
      }

      .rgbd-grid,
      .dog-grid {
        position: absolute;
        inset: 0;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 1px;
        background: var(--line);
      }

      .rgbd-pane,
      .dog-pane {
        position: relative;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        background: oklch(8% 0.015 175);
      }

      .rgbd-pane .stream-label,
      .dog-pane .stream-label {
        position: absolute;
        top: var(--space-sm);
        left: var(--space-sm);
        z-index: 3;
        border: 1px solid oklch(100% 0 0 / 0.14);
        border-radius: 6px;
        padding: 5px 8px;
        background: oklch(10% 0.014 175 / 0.72);
        color: oklch(98% 0.012 195);
        font-family: var(--font-display);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      body.dog-mode .dog-grid {
        background: transparent;
      }

      body.dog-mode .dog-camera-pane {
        position: absolute;
        inset: 0;
        z-index: 0;
      }

      body.dog-mode .dog-lidar-pane {
        position: absolute;
        top: var(--space-md);
        left: var(--space-md);
        z-index: 4;
        width: clamp(190px, 28%, 320px);
        aspect-ratio: 4 / 3;
        border: 1px solid oklch(100% 0 0 / 0.18);
        border-radius: 8px;
        box-shadow:
          0 18px 52px oklch(0% 0 0 / 0.46),
          inset 0 0 0 1px oklch(100% 0 0 / 0.08);
        background: oklch(8% 0.015 175 / 0.84);
      }

      body.dog-mode .dog-lidar-pane .stream-label {
        top: 8px;
        right: 8px;
        left: auto;
      }

      body.dog-mode .dog-camera-pane .stream-label,
      body.dog-mode .feed-corners {
        display: none;
      }

      .dog-lidar-empty {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 38px 14px 14px;
        color: oklch(90% 0.03 195 / 0.72);
        font-family: var(--font-display);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-align: center;
        text-transform: uppercase;
      }

      .dog-lidar-pane.has-lidar .dog-lidar-empty {
        display: none;
      }

      .reticle {
        position: absolute;
        inset: 50% auto auto 50%;
        z-index: 3;
        width: 132px;
        height: 132px;
        border: 1px solid oklch(72% 0.11 170 / 0.54);
        border-radius: 50%;
        pointer-events: none;
        translate: -50% -50%;
      }

      .reticle::before,
      .reticle::after {
        position: absolute;
        background: oklch(72% 0.11 170 / 0.58);
        content: "";
      }

      .reticle::before {
        top: 50%;
        left: -26px;
        right: -26px;
        height: 1px;
      }

      .reticle::after {
        top: -26px;
        bottom: -26px;
        left: 50%;
        width: 1px;
      }

      .scan-overlay {
        position: absolute;
        inset: 0;
        z-index: 4;
        pointer-events: none;
        opacity: 0;
        visibility: hidden;
        transition: opacity 140ms ease;
      }

      body.scan-pending .scan-overlay {
        opacity: 1;
        visibility: visible;
      }

      .scan-overlay::before {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        width: 3px;
        background: linear-gradient(
          180deg,
          transparent,
          color-mix(in oklch, var(--accent) 85%, white),
          transparent
        );
        box-shadow:
          0 0 22px color-mix(in oklch, var(--accent) 72%, transparent),
          0 0 68px color-mix(in oklch, var(--accent) 44%, transparent);
        content: "";
        animation: scan-sweep 1.15s linear infinite;
      }

      .scan-overlay::after {
        position: absolute;
        top: calc(var(--space-md) + 42px);
        right: var(--space-md);
        border: 1px solid color-mix(in oklch, var(--accent) 54%, transparent);
        border-radius: 6px;
        padding: 6px 9px;
        background: oklch(10% 0.014 175 / 0.78);
        color: var(--accent);
        content: "SCANNING";
        font-family: var(--font-display);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      @keyframes scan-sweep {
        from {
          left: 0;
          translate: -8px 0;
        }
        to {
          left: 100%;
          translate: 0 0;
        }
      }

      body.dancing .reticle {
        animation: dance-bounce 280ms ease-in-out alternate infinite;
      }

      body.dancing .video-shell {
        animation: dance-glow 480ms ease-in-out alternate infinite;
      }

      @keyframes dance-bounce {
        from {
          scale: 1;
          rotate: -2deg;
        }
        to {
          scale: 1.08;
          rotate: 2deg;
        }
      }

      @keyframes dance-glow {
        from {
          box-shadow: var(--shadow);
        }
        to {
          box-shadow:
            var(--shadow),
            0 0 42px color-mix(in oklch, var(--pink) 34%, transparent);
        }
      }

      .feed-corners {
        position: absolute;
        inset: 14px;
        z-index: 3;
        pointer-events: none;
      }

      .feed-corners::before,
      .feed-corners::after {
        position: absolute;
        width: 44px;
        height: 44px;
        border-color: oklch(72% 0.11 170 / 0.76);
        content: "";
      }

      .feed-corners::before {
        top: 0;
        left: 0;
        border-top: 1px solid;
        border-left: 1px solid;
      }

      .feed-corners::after {
        right: 0;
        bottom: 0;
        border-right: 1px solid;
        border-bottom: 1px solid;
      }

      .video-overlay {
        right: var(--space-sm);
        bottom: var(--space-sm);
        left: var(--space-sm);
        z-index: 4;
        justify-content: space-between;
        gap: var(--space-xs);
      }

      .chip {
        min-height: 30px;
        border: 1px solid oklch(100% 0 0 / 0.12);
        padding: 6px 9px;
        background: oklch(14% 0.014 175 / 0.78);
        color: var(--ink);
        font-family: var(--font-display);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        backdrop-filter: blur(16px);
      }

      .controls {
        grid-template-columns: repeat(2, minmax(0, 190px));
        gap: var(--space-xs);
        padding: var(--space-xs);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: oklch(15.5% 0.015 175 / 0.86);
      }

      button {
        min-height: 44px;

        --scanner-green: oklch(78% 0.17 152);

      body {

          radial-gradient(circle at 10% 0%, color-mix(in oklch, var(--accent) 16%, transparent), transparent 28rem),
          linear-gradient(180deg, oklch(98% 0.025 198), oklch(96% 0.025 82)),
          var(--bg);
        color: var(--ink);

      header {
        border-bottom-color: var(--line);
        background: oklch(100% 0.014 195 / 0.9);
        box-shadow: 0 10px 28px oklch(45% 0.06 220 / 0.08);

      dd,
      .log-message,
      .line {

      .panel-title,

      .status {

        color: color-mix(in oklch, var(--pink) 62%, var(--ink));

      .record-toggle[data-running="true"],
      button.bp5-button.record-toggle[data-running="true"] {
        background: linear-gradient(180deg, var(--pink), color-mix(in oklch, var(--coral-hot) 64%, var(--pink)));

      .video-shell {

      body.dog-mode .idle-feed {
        display: none;
      }

      body:not(.record3d-mode):not(.dog-mode) video {
        display: none;
      }

      .chip {
        border-color: color-mix(in oklch, var(--accent) 42%, transparent);

        color: var(--accent-ink);

      .scan-overlay::before {
        width: 5px;
        background: linear-gradient(180deg, transparent, var(--pink), var(--scanner-green), transparent);

          0 0 76px color-mix(in oklch, var(--scanner-green) 46%, transparent);
      }

      .scan-overlay::after {
        border-color: color-mix(in oklch, var(--pink) 38%, var(--scanner-green));
        background: oklch(100% 0.012 190 / 0.82);
        color: var(--accent-ink);
      }

      button.bp5-button,
      .photo a.bp5-button {
        border-color: color-mix(in oklch, var(--accent) 34%, var(--line));
        background:
          linear-gradient(180deg, oklch(100% 0.014 195), oklch(96% 0.022 195)),

        color: var(--ink);

      .photo {
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 10px;
        min-height: 0;
        overflow: visible;
        padding: 0;

      .photo-frame {

        height: auto;

      .photo-frame img {

      main {
        height: calc(100dvh - 73px);
        padding: 18px 24px 10px;
        overflow: visible;
      }

      aside {
        grid-template-rows: minmax(0, 1fr) auto;
        overflow: visible;
      }

      .brand {
        gap: 0;
      }

      h1 {
        font-family: var(--font-logo);
        font-size: 42px;
        font-weight: 400;
        letter-spacing: 0;
        line-height: 1;
        color: oklch(99% 0.01 345);
        paint-order: stroke fill;
        -webkit-text-stroke: 0.45px oklch(14% 0.05 305 / 0.78);
        text-shadow:
          0 1px 0 oklch(8% 0.04 305 / 0.86),
          1px 0 0 oklch(8% 0.04 305 / 0.62),
          -1px 0 0 oklch(8% 0.04 305 / 0.48),
          0 0 3px color-mix(in oklch, white 72%, var(--pink)),
          0 0 9px color-mix(in oklch, var(--pink) 82%, white),
          0 0 20px color-mix(in oklch, var(--pink) 72%, transparent),
          0 0 46px color-mix(in oklch, var(--logo-purple) 58%, transparent),
          0 0 82px color-mix(in oklch, var(--pink) 34%, transparent);
      }

      .video-shell .line {
        position: absolute;
        right: 72px;
        bottom: 104px;
        left: 72px;
        z-index: 5;
        min-height: 0;
        margin: 0;
        color: oklch(99% 0.006 195);
        font-family: var(--font-display);
        font-size: 40px;
        font-weight: 700;
        line-height: 1.05;
        text-align: center;
        text-shadow:
          0 2px 0 oklch(24% 0.12 306 / 0.92),
          0 0 2px oklch(24% 0.12 306 / 0.88),
          1px 1px 0 oklch(24% 0.12 306 / 0.86),
          -1px 1px 0 oklch(24% 0.12 306 / 0.82),
          1px -1px 0 oklch(24% 0.12 306 / 0.82),
          -1px -1px 0 oklch(24% 0.12 306 / 0.78),
          0 0 14px color-mix(in oklch, var(--logo-purple) 72%, transparent),
          0 8px 28px color-mix(in oklch, var(--logo-purple) 54%, transparent);
        text-wrap: balance;
        pointer-events: none;
      }

      .photo-frame {
        aspect-ratio: 1 / 1.16;
        height: auto;
        max-height: none;
        padding: 16px 16px 68px;
        border: 1px solid oklch(87% 0.035 192);
        border-radius: 4px;
        background:
          linear-gradient(180deg, oklch(99.5% 0.003 195), oklch(97.5% 0.004 195)),
          white;
        box-shadow:
          0 18px 34px oklch(45% 0.06 220 / 0.18),
          0 1px 0 oklch(100% 0 0 / 0.9) inset;
      }

      .photo-frame::before {
        inset: 16px 16px 68px;
        border: 1px solid oklch(90% 0.026 196);
        background: oklch(99% 0.006 195);

      .photo-frame:has(#photoPreview[src]:not([src=""]))::before {

      }

      .photo-frame img {

        border: 1px solid oklch(90% 0.026 196);

      }

      .photo-frame::after {
        inset: auto 22% 30px;
        height: 1px;
        padding: 0;
        background: color-mix(in oklch, var(--pink) 18%, transparent);
        content: "";
      }

      header {
        border-bottom: 0;
        background: transparent;
        box-shadow: none;
        backdrop-filter: none;
      }

      .events-panel,
      aside > section.bp5-card {
        border: 0;
        background: transparent;
        box-shadow: none;
        padding: 0;
        backdrop-filter: none;
      }

      .photo-frame::after {
        display: none;
      }

      .stage > section.bp5-card.events-panel,
      .events-panel,
      .events-panel .log,
      .events-panel .log-row,
      aside > section.bp5-card {
        border: 0 !important;
        background: transparent !important;
        box-shadow: none !important;
        backdrop-filter: none !important;
      }

      .stage > section.bp5-card.events-panel,
      aside > section.bp5-card {
        padding: 0 !important;
      }

      body.dog-mode .dog-lidar-pane {
        border-color: color-mix(in oklch, var(--accent) 58%, white);
        background:
          linear-gradient(180deg, oklch(100% 0.01 195 / 0.78), oklch(96% 0.025 198 / 0.64)),
          oklch(99% 0.012 195 / 0.72);
        box-shadow:
          0 16px 38px oklch(45% 0.06 220 / 0.2),
          inset 0 0 0 1px oklch(100% 0 0 / 0.62);
        backdrop-filter: blur(12px) saturate(0.88);
      }

      body.dog-mode .dog-lidar-pane .stream-label {
        border-color: color-mix(in oklch, var(--accent) 42%, white);
        background: oklch(100% 0.012 195 / 0.82);
        color: color-mix(in oklch, var(--logo-purple) 72%, var(--ink));
      }

      body.dog-mode .dog-lidar-pane.has-lidar .dog-lidar-preview {
        filter: invert(1) brightness(1.12) contrast(0.9) saturate(0.72);
        mix-blend-mode: multiply;
        opacity: 0.86;
      }

      .dog-lidar-empty {
        color: color-mix(in oklch, var(--logo-purple) 42%, var(--muted));
        text-shadow: none;
      }

      body.dog-mode .dog-lidar-empty {
        display: none;
      }

      body.dog-mode .dog-preview {
        object-position: 82% center;
      }

      body.dog-mode .dog-lidar-pane {
        transition:
          width 180ms ease,
          height 180ms ease,
          box-shadow 180ms ease,
          background 180ms ease;
      }

      body.dog-mode .dog-lidar-pane:not(.has-lidar) {
        width: auto;
        min-width: 0;
        height: auto;
        aspect-ratio: auto;
        overflow: visible;
        border: 0;
        background: transparent;
        box-shadow: none;
        backdrop-filter: none;
      }

      body.dog-mode .dog-lidar-pane:not(.has-lidar) .stream-label,
      body.dog-mode .dog-lidar-pane:not(.has-lidar) .dog-lidar-preview {
        display: none;
      }

      body.dog-mode .dog-lidar-pane:not(.has-lidar)::before {
        display: inline-flex;
        align-items: center;
        min-height: 36px;
        border: 1px solid oklch(78% 0.012 225);
        border-radius: 8px;
        padding: 8px 12px;
        background: oklch(100% 0.012 195 / 0.82);
        color: oklch(70% 0.012 225);
        content: "NO LIDAR SIGNAL";
        font-family: var(--font-display);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        line-height: 1;
        text-transform: uppercase;
        white-space: nowrap;
        backdrop-filter: blur(12px);
      }

      .stage {
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 10px;
      }

      .events-panel {
        max-height: 150px;
        overflow: hidden;
      }

      .log {
        gap: 0;
        max-height: 150px;
        padding: 10px 10px 0;
        color: color-mix(in oklch, var(--logo-purple) 76%, var(--ink));
        font-size: 14px;
        line-height: 1.25;
      }

      .log-row {
        grid-template-columns: 80px minmax(0, 1fr);
        gap: 14px;
        align-items: baseline;
        min-height: 25px;
        padding: 3px 0;
        border-bottom: 0 !important;
      }

      .log-time {
        color: color-mix(in oklch, var(--pink) 82%, var(--logo-purple));
        font-weight: 500;
      }

      .log-message {
        color: color-mix(in oklch, var(--logo-purple) 76%, var(--ink));
        font-weight: 400;
      }

      .photo-frame::before {
        border-color: color-mix(in oklch, var(--accent) 42%, oklch(67% 0.05 205));
        background: oklch(99% 0.006 195);
        filter: none;
        opacity: 1;
      }

      .photo-frame::after {
        position: absolute;
        inset: 16px 16px 68px;
        display: block;
        background: url("/fetch/static/logo.png") center / min(48%, 260px) auto no-repeat;
        content: "";
        filter: grayscale(1) saturate(0.06) brightness(0.72) contrast(1.35);
        opacity: 0.5;
        pointer-events: none;
      }

      .photo-frame:has(#photoPreview[src]:not([src=""]))::after {
        display: none;
      }

      aside {
        grid-template-rows: auto auto;
        align-content: start;
        gap: 14px;
        overflow: visible;
      }

      .photo {
        grid-template-rows: auto auto;
        align-content: start;
        gap: 10px;
      }

      .photo-frame {
        border-color: oklch(75% 0.012 225);
      }

      .photo-frame::before {
        display: block !important;
        z-index: 0;
      }

      .photo-frame::after {
        display: none !important;
      }

      .photo-frame:has(#photoPreview[src]:not([src=""]))::after {
        position: absolute;
        inset: auto 0 0 auto;
        z-index: 3;
        display: block !important;
        width: min(48%, 320px);
        aspect-ratio: 1;
        background: radial-gradient(
          circle at 82% 82%,
          oklch(100% 0 0 / 0.72) 0%,
          oklch(100% 0 0 / 0.42) 32%,
          oklch(100% 0 0 / 0.16) 58%,
          transparent 76%
        );
        content: "";
        pointer-events: none;
      }

      .photo-frame:has(#photoPreview[src]:not([src=""]))::before {
        display: none !important;
      }

      .photo-frame::before,
      #photoPreview {
        border-color: oklch(78% 0.012 225);
      }

      .photo-watermark {
        position: absolute !important;
        inset: 16px 16px 68px;
        z-index: 1;
        display: block;
        width: min(48%, 260px) !important;
        height: auto !important;
        max-width: none;
        max-height: 30%;
        margin: auto;
        border: 0 !important;
        background: transparent !important;
        filter: grayscale(1) saturate(0.04) brightness(1.08) contrast(0.96);
        object-fit: contain !important;
        opacity: 0.28;
        pointer-events: none;
      }

      .photo-frame:has(#photoPreview[src]:not([src=""])) .photo-watermark {
        inset: auto 38px 92px auto;
        z-index: 4;
        width: min(24%, 170px) !important;
        max-height: none;
        margin: 0;
        filter: grayscale(0.1) drop-shadow(0 2px 5px oklch(20% 0.02 230 / 0.22));
        opacity: 0.82;
      }

      #photoPreview {
        position: relative;
        z-index: 2;
      }

      .events-panel {
        max-height: 116px;
        align-self: start;
      }

      .log {
        max-height: 116px;
        padding: 0 12px;
        color: oklch(75% 0.012 225);
      }

      .log-time,
      .log-message {
        color: oklch(75% 0.012 225);
        font-weight: 400;
      }

      .header-metrics .status,
      .header-metrics .record-toggle,
      .header-metrics button.bp5-button.record-toggle {
        box-shadow: none !important;
        filter: none;
      }

      @media (max-width: 820px) {
        body {
          font-size: 14px;
          height: auto;
          min-height: 100dvh;
          overflow: auto;
        }

        header {
          align-items: flex-start;
          flex-direction: column;
          gap: var(--space-md);
        }

        .header-metrics {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          width: 100%;
        }

        .status {
          grid-column: span 2;
          width: 100%;
        }

        main {
          grid-template-columns: 1fr;
          gap: var(--space-md);
          height: auto;
          padding: var(--space-sm);
          overflow: visible;
        }

        .stage,
        aside {
          grid-template-rows: none;
          overflow: visible;
        }

        .stage-head {
          align-items: flex-start;
          flex-direction: column;
        }

        .video-shell {
          aspect-ratio: 4 / 3;
          height: auto;
          min-height: 280px;
        }

        .video-shell .line {
          right: 24px;
          bottom: 82px;
          left: 24px;
          font-size: 28px;
        }

        .controls {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .photo {
          grid-template-rows: minmax(220px, auto) auto;
        }
      }

      @media (max-width: 440px) {
        .controls {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .video-shell {
          aspect-ratio: 4 / 3;
          height: auto;
          min-height: 230px;
        }

        .header-metrics {
          grid-template-columns: 1fr;
        }

        .status {
          grid-column: auto;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
        }
      }
      .audio-modal {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--space-md);
      }
      .audio-modal[hidden] {
        display: none;
      }
      .audio-modal-backdrop {
        position: absolute;
        inset: 0;
        background: oklch(8% 0.014 175 / 0.62);
        animation: audio-fade 160ms ease-out;
      }
      .audio-modal-card {
        position: relative;
        width: min(440px, 100%);
        max-height: calc(100dvh - 2 * var(--space-md));
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: var(--space-md);
        padding: var(--space-lg);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        animation: audio-rise 180ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      .audio-modal-head {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .audio-modal-title {
        margin: 0;
        font-family: var(--font-display);
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: var(--ink);
      }
      .audio-modal-sub {
        margin: 0;
        font-size: 13px;
        color: var(--faint);
      }
      .audio-group-label {
        display: block;
        margin-bottom: var(--space-xs);
        font-family: var(--font-display);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--faint);
      }
      .audio-modes {
        display: flex;
        flex-direction: column;
        gap: var(--space-xs);
        border: 0;
        margin: 0;
        padding: 0;
      }
      .audio-mode {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: var(--space-sm);
        min-height: 56px;
        padding: var(--space-sm) var(--space-md);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: color-mix(in oklch, var(--panel-strong) 55%, transparent);
        cursor: pointer;
        transition: border-color 160ms ease-out, background 160ms ease-out;

      .audio-mode:hover:not(.disabled) {
        border-color: var(--line-strong);
        background: var(--panel-strong);
      }
      .audio-mode:has(input:checked) {
        border-color: color-mix(in oklch, var(--accent) 70%, var(--line));
        background: color-mix(in oklch, var(--accent) 14%, var(--panel-strong));
      }
      .audio-mode:has(input:focus-visible) {
        box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 30%, transparent);
      }
      .audio-mode.disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .audio-mode input {
        width: 18px;
        height: 18px;
        accent-color: var(--accent);
      }
      .audio-mode-body {
        display: flex;
        flex-direction: column;
        gap: 1px;
        min-width: 0;
      }
      .audio-mode-name {
        font-weight: 600;
        font-size: 14px;
        color: var(--ink);
      }
      .audio-mode-desc {
        font-size: 12px;
        color: var(--muted);
      }
      .audio-status {
        font-family: var(--font-display);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 3px 8px;
        border-radius: 999px;
        white-space: nowrap;
      }
      .audio-status[data-ready="true"] {
        color: var(--ok);
        background: color-mix(in oklch, var(--ok) 16%, transparent);
      }
      .audio-status[data-ready="false"] {
        color: var(--amber);
        background: color-mix(in oklch, var(--amber) 14%, transparent);
      }
      .audio-fields {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-md);
      }
      .audio-field {
        display: flex;
        flex-direction: column;
        gap: var(--space-xs);
        min-width: 0;
      }
      .audio-field-label {
        font-family: var(--font-display);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--faint);
      }
      .audio-field select {
        width: 100%;
        min-height: 44px;
        padding: 0 var(--space-sm);
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel-strong);
        color: var(--ink);
        font-family: var(--font-body);
        font-size: 14px;
      }
      .audio-field select:hover:not(:disabled) {
        border-color: var(--line-strong);
      }
      .audio-field.disabled {
        opacity: 0.5;
      }
      .audio-modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: var(--space-sm);
        margin-top: var(--space-xs);
      }
      @keyframes audio-fade {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes audio-rise {
        from { opacity: 0; transform: translateY(8px) scale(0.98); }
        to { opacity: 1; transform: none; }
      }
      @media (prefers-reduced-motion: reduce) {
        .audio-modal-backdrop,
        .audio-modal-card {
          animation: none;
        }
      }
      @media (max-width: 480px) {
        .audio-fields {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

    <canvas id="canvas" hidden></canvas>
    <audio id="audio" playsinline></audio>
    <audio id="printAudio" preload="auto" playsinline src="/fetch/static/audio/freesound_community-polaroid_600-83252.mp3"></audio>

    <script>
      const els = {
        recordToggle: document.getElementById("recordToggle"),
        audioSettings: document.getElementById("audioSettings"),
        audioModal: document.getElementById("audioModal"),
        audioVoice: document.getElementById("audioVoice"),
        audioLiveModel: document.getElementById("audioLiveModel"),
        audioSave: document.getElementById("audioSave"),
        video: document.getElementById("video"),
        canvas: document.getElementById("canvas"),
        frameRate: document.getElementById("frameRate"),
        motion: document.getElementById("motion"),
        rgbdStatus: document.getElementById("rgbdStatus"),
        sourceOverlay: document.getElementById("sourceOverlay"),
        sourceLabel: document.getElementById("sourceLabel"),
        line: document.getElementById("line"),
        dogPreview: document.getElementById("dogPreview"),
        dogLidarPreview: document.getElementById("dogLidarPreview"),
        record3dPreview: document.getElementById("record3dPreview"),
        depthPreview: document.getElementById("depthPreview"),
        photoPreview: document.getElementById("photoPreview"),
        log: document.getElementById("log"),
        audio: document.getElementById("audio"),
        printAudio: document.getElementById("printAudio"),
      };

      const DOG_PLACEHOLDER_SRC = "/fetch/static/idle-camera-feed.png";
      const PRINT_SOUND_SRC = "/fetch/static/audio/freesound_community-polaroid_600-83252.mp3";
      const SCAN_INTERVAL_MS = 1000;

      const state = {
        ws: null,
        stream: null,
        scanning: false,
        workflow: "find_guest",
        visionSource: "browser",
        pendingFrame: false,
        speaking: false,
        photoInProgress: false,
        frameId: 0,
        lastDecisionAt: 0,
        lastLine: "",
        lastGreetAt: 0,
        lastPhotoAt: 0,
        timer: null,
        statusTimer: null,
        transportStatus: "offline",
        lastDogFrames: 0,
        lastDogLidarFrames: 0,
        dogConnectionActive: false,
        dogCameraStreaming: false,
        dogCameraLive: false,
        dogLidarLive: false,
        robotPreflightPromise: null,
        robotPreflightComplete: false,
        lastRecord3dFrames: 0,
        audioContext: null,
        realtimePc: null,
        realtimeDataChannel: null,
        realtimeSessionPromise: null,
        realtimePending: null,
        realtimeDisabled: false,
        ttsProvider: "openai",
        audioRoute: "speak",
        realtimeAvailable: false,
        conversationEnabled: false,
        conversationActive: false,
        micStream: null,
        micSource: null,
        micWorkletNode: null,
        micScriptNode: null,
        playbackSampleRate: 24000,
        playbackTime: 0,
        playbackSources: [],
        echoGate: false,
        echoSuppress: false,
        lastConvFrameAt: 0,
        audioMode: "",
        voice: "echo",
        liveModel: "gemini-3.1-flash-live-preview",
        liveModelExplicit: false,
        openaiAvailable: false,
        geminiAvailable: false,
        audioModalOpener: null,
      };

      const REALTIME_CLIENT_SECRET_TIMEOUT_MS = 5000;
      const REALTIME_SDP_TIMEOUT_MS = 8000;
      const MIC_TARGET_RATE = 16000;
      const CONV_FRAME_INTERVAL_MS = 2500;
      const AUDIO_MODES = ["live", "gemini_tts", "openai_tts"];

      function setStatus(text) {
        state.transportStatus = text;
        renderStatus();
      }

      function setStatusPill(label, stateKey) {
        const normalizedState = stateKey.toLowerCase().replace(/\s+/g, "-");
        els.sourceOverlay.dataset.state = normalizedState;
        els.sourceOverlay.title = label;
        els.sourceOverlay.setAttribute("aria-label", `${els.sourceLabel.textContent}: ${label}`);
      }

      function updateRecordAvailability() {
        const disabled = state.visionSource === "dog" && !state.dogCameraStreaming && !state.scanning;
        els.recordToggle.disabled = disabled;
        els.recordToggle.title = disabled ? "I’m waiting for my dog-cam to wake up." : "";
      }

      function renderStatus() {
        if (state.visionSource === "dog") {
          if (state.dogCameraStreaming) {
            setStatusPill("I’m ready", "connected");
          } else if (state.dogConnectionActive) {
            setStatusPill("I’m warming up", "connecting");
          } else {
            setStatusPill("I’m offline", "dog offline");
          }
          updateRecordAvailability();
          return;
        }
        setStatusPill(state.transportStatus, state.transportStatus);
        updateRecordAvailability();
      }

      function log(message) {
        const time = new Date().toLocaleTimeString();
        const row = document.createElement("div");
        const stamp = document.createElement("span");
        const body = document.createElement("span");
        row.className = "log-row";
        stamp.className = "log-time";
        body.className = "log-message";
        stamp.textContent = time;
        body.textContent = message;
        row.append(stamp, body);
        els.log.prepend(row);
        while (els.log.children.length > 28) {
          els.log.lastElementChild.remove();
        }
      }

      function setScanPending(pending) {
        state.pendingFrame = pending;
        document.body.classList.toggle("scan-pending", pending);
      }

      function setWorkflow(workflow, message) {
        state.workflow = workflow;
        if (message) {
          els.line.textContent = message;
        }
        log(`workflow ${workflow}`);
      }

      function decisionSubtitle(message) {
        if (message.line) {
          return message.line;
        }

        const stateName = String(message.state || "search").replace(/_/g, " ");
        const target = message.target || {};
        const targetText = target.description && target.description !== "none"
          ? ` I see ${target.description}.`
          : "";
        const evidenceText = target.free_hand_evidence && target.free_hand_evidence !== "none"
          ? ` ${target.free_hand_evidence}.`
          : "";
        const offer = message.offer || {};
        const offerText = [offer.drink ? "Coke" : "", offer.photo ? "photo" : ""]
          .filter(Boolean)
          .join(" and ");

        if (message.state === "idle") {
          return "I’m getting ready for the next Coke/photo mission.";
        }
        if (message.state === "search") {
          return "Hunting for a photogenic target.";
        }
        if (message.state === "approach") {
          return `I found a good target.${targetText} I’m rolling over now.`;
        }
        if (message.state === "wait_for_bottle") {
          return "Hold that Coke up for me. I’m lining up the shot.";
        }
        if (message.state === "photo_ready") {
          return "Perfect. I’ve got the Coke in frame and I’m taking the photo.";
        }
        if (offerText) {
          return `I’m in ${stateName} mode for a ${offerText}.${targetText}${evidenceText}`;
        }
        return `I’m in ${stateName} mode.${targetText}${evidenceText}`;
      }

      function shouldExecuteRobotMove(message, cmd) {
        const hasMotion = Math.abs(cmd.linear_x || 0) > 0 || Math.abs(cmd.angular_z || 0) > 0;
        if (!hasMotion) {
          return false;
        }
        if (message.state === "approach") {
          return true;
        }
        return (
          message.state === "search" &&
          state.workflow === "find_guest" &&
          state.visionSource === "dog"
        );
      }

      async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 },
          },
          audio: false,
        });
        state.stream = stream;
        els.video.srcObject = state.stream;
        await els.video.play();
        setVisionSource("browser");
        setStatus("camera");
        log("camera ready");
      }

      function connect() {
        if (state.ws && state.ws.readyState === WebSocket.OPEN) {
          setStatus("connected");
          log("socket already open");
          return;
        }
        const scheme = window.location.protocol === "https:" ? "wss" : "ws";
        state.ws = new WebSocket(`${scheme}://${window.location.host}/fetch/ws`);
        setStatus("connecting");
        state.ws.onopen = () => {
          setStatus("connected");
          log("socket open");
          if (state.scanning) {
            sendFrame();
          }
        };
        state.ws.onclose = () => {
          setStatus("offline");
          state.scanning = false;
          setScanPending(false);
          setRunningUi(false);
          closeRealtimeVoiceSession();
          if (state.conversationActive) {
            endConversation(false);
          }
          log("socket closed");
        };
        state.ws.onerror = () => {
          setStatus("socket error");
          log("socket error");
        };
        state.ws.onmessage = (event) => handleMessage(JSON.parse(event.data));
      }

      function captureDataUrl(maxWidth = 640) {
        const videoWidth = els.video.videoWidth || 1280;
        const videoHeight = els.video.videoHeight || 720;
        const width = Math.min(maxWidth, videoWidth);
        const height = Math.round((width / videoWidth) * videoHeight);
        els.canvas.width = width;
        els.canvas.height = height;
        const ctx = els.canvas.getContext("2d", { alpha: false });
        ctx.drawImage(els.video, 0, 0, width, height);
        return els.canvas.toDataURL("image/jpeg", 0.72);
      }

      async function showPhotoResult(url) {
        els.photoPreview.src = url;
      }

      function sendFrame() {
        if (!state.scanning || state.pendingFrame) {
          return;
        }
        if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
          return;
        }
        if (state.conversationActive) {
          const nowTs = Date.now();
          if (nowTs - state.lastConvFrameAt < CONV_FRAME_INTERVAL_MS) {
            return;
          }
          state.lastConvFrameAt = nowTs;
        }
        if (state.visionSource === "dog") {
          if (!state.dogCameraStreaming || state.lastDogFrames === 0) {
            log("No live Go2 camera frame received yet");
            return;
          }
          setScanPending(true);
          state.frameId += 1;
          state.ws.send(
            JSON.stringify({
              type: "dog_frame",
              frame_id: state.frameId,
              interaction_phase: state.workflow,
              ts: Date.now(),
            }),
          );
          return;
        }

        if (state.visionSource === "record3d") {
          if (state.lastRecord3dFrames === 0) {
            log("No Record3D frame received yet");
            return;
          }
          setScanPending(true);
          state.frameId += 1;
          state.ws.send(
            JSON.stringify({
              type: "record3d_frame",
              frame_id: state.frameId,
              interaction_phase: state.workflow,
              ts: Date.now(),
            }),
          );
          return;
        }
        if (!els.video.videoWidth) {
          return;
        }

        setScanPending(true);
        state.frameId += 1;
        state.ws.send(
          JSON.stringify({
            type: "frame",
            frame_id: state.frameId,
            image: captureDataUrl(),
            depth_hint: null,
            interaction_phase: state.workflow,
            ts: Date.now(),
          }),
        );
      }

      async function handleMessage(message) {
        if (message.type === "hello") {
          state.ttsProvider = message.tts_provider || "openai";
          state.audioRoute = message.audio_route || "speak";
          state.realtimeAvailable = Boolean(message.realtime_enabled);
          state.conversationEnabled = Boolean(message.conversation_enabled);
          state.openaiAvailable = Boolean(message.openai_available);
          state.geminiAvailable = Boolean(message.gemini_available);
          // Honor the server's --conversation-model unless the user picked one.
          if (!state.liveModelExplicit && message.conversation_model) {
            state.liveModel = message.conversation_model;
          }
          reconcileAudioMode();
          refreshAudioModal();
          if (state.audioRoute !== "realtime_then_speak") {
            closeRealtimeVoiceSession();
          }
          log(`vision ${message.vision_provider || "openai"} ${message.model}; audio ${state.audioRoute}; mode ${state.audioMode}`);
          return;
        }
        if (message.type === "audio_out") {
          handleAudioOut(message);
          return;
        }
        if (message.type === "transcript") {
          handleTranscript(message);
          return;
        }
        if (message.type === "interrupted") {
          handleInterrupted();
          return;
        }
        if (message.type === "conversation_state") {
          await handleConversationState(message);
          return;
        }
        if (message.type === "error") {
          setScanPending(false);
          if (message.dog) {
            applyDogStatus(message.dog);
          }
          log(message.message);
          return;
        }
        if (message.type !== "decision") {
          return;
        }

        setScanPending(false);
        const now = performance.now();
        const fps = state.lastDecisionAt ? 1000 / (now - state.lastDecisionAt) : 0;
        state.lastDecisionAt = now;
        els.frameRate.textContent = `${fps.toFixed(1)} fps`;

        const cmd = message.simulated_cmd_vel || {};
        els.motion.textContent = `cmd ${(cmd.linear_x || 0).toFixed(2)} / ${(cmd.angular_z || 0).toFixed(2)}`;
        if (shouldExecuteRobotMove(message, cmd) && !state.conversationActive) {
          robotAction({
            action: "move",
            linear_x: cmd.linear_x || 0,
            angular_z: cmd.angular_z || 0,
            duration_s: cmd.duration_s || 0,
          });
        }
        const target = message.target || {};
        const offer = message.offer || {};
        const offerText = [offer.drink ? "drink" : "", offer.photo ? "photo" : ""]
          .filter(Boolean)
          .join(" + ") || "none";

        els.line.textContent = decisionSubtitle(message);
        const targetText = `${target.bearing || "unknown"}, ${target.range || "unknown"}: ${target.description || "none"}`;
        log(`${message.state}/${message.action || "none"}: ${targetText}; ${target.free_hand_evidence || "none"}; offer ${offerText}`);
        if (message.dog) {
          applyDogStatus(message.dog);
          log(`dog camera ${message.dog.frames_received || 0}, lidar ${message.dog.lidar_frames_received || 0}`);
        }
        if (message.record3d) {
          log(`record3d frames ${message.record3d.frames_received || 0}`);
        }

        if (state.conversationActive) {
          // The live conversation owns audio, motion, and the photo; vision
          // frames during a conversation are framing hints only (already sent
          // to the live session by the server).
          return;
        }

        if (message.state === "greet" && message.line && state.workflow === "find_guest") {
          await beginOffer(message);
          return;
        }

        if (
          (message.state === "photo_ready" || message.action === "take_photo_dance") &&
          state.workflow === "confirm_bottle"
        ) {
          await completePhoto(message);
          return;
        }

        if (message.state === "wait_for_bottle" && message.line && state.workflow === "confirm_bottle") {
          await speakOnce(message.line, "coached photo pose");
        }
      }

      async function beginOffer(message) {
        const now = Date.now();
        if (now - state.lastGreetAt < 12000 || state.speaking) {
          return;
        }
        state.lastGreetAt = now;
        state.lastLine = message.line;
        els.motion.textContent = "wave";
        await robotAction({ action: "wave" });
        if (state.audioMode === "live" && state.conversationEnabled) {
          await startMic();
          if (state.micStream) {
            state.conversationActive = true;
            state.lastConvFrameAt = Date.now();
            setWorkflow("confirm_bottle", "Live conversation: taking the order and photo.");
            if (state.ws && state.ws.readyState === WebSocket.OPEN) {
              state.ws.send(JSON.stringify({
                type: "conversation_start",
                context: message.line,
                voice: state.voice,
                model: state.liveModel,
              }));
            }
            log("live conversation started");
            return;
          }
          log("mic unavailable; using scripted offer");
        }
        log("wave and Coke-for-photo offer");
        await speakOnce(message.line, "spoke joke and offer");
        setWorkflow("confirm_bottle", "Hold that Coke up for me. I’m lining up the shot.");
      }

      async function completePhoto(message) {
        const now = Date.now();
        if (now - state.lastPhotoAt < 10000 || state.photoInProgress) {
          return;
        }
        state.lastPhotoAt = now;
        state.photoInProgress = true;
        try {
          const line = message.line || "Hold the Coke can up front and center. Cheers.";
          els.line.textContent = line;
          await speakOnce(line, "spoke cheese cue");
          await snapPhoto();
          await playPrintSound();
          const doneLine = "Got it. Your photo is saved to iCloud. Tiny victory dance, then I’m off.";
          els.line.textContent = doneLine;
          await speakOnce(doneLine, "spoke photo pickup cue");
          dance();
          await robotAction({ action: "dance" });
          log("photo saved; dance triggered");
          await sleep(2500);
          const byeLine = "Thanks for hanging out. Bye.";
          els.line.textContent = byeLine;
          await speakOnce(byeLine, "spoke goodbye");
          setWorkflow("find_guest", "Photo printed. I’m sniffing out the next Coke/photo star.");
        } finally {
          state.photoInProgress = false;
        }
      }

      async function speakOnce(text, successLog) {
        if (!text || state.speaking) {
          return;
        }
        state.speaking = true;
        try {
          await speak(text);
          if (successLog) {
            log(successLog);
          }
        } catch (err) {
          log(`speech ${err.message}`);
        } finally {
          state.speaking = false;
        }
      }

      function getRealtimeSecretValue(payload) {
        if (!payload || typeof payload !== "object") {
          return "";
        }
        if (payload.client_secret && typeof payload.client_secret === "object") {
          return payload.client_secret.value || "";
        }
        return payload.value || payload.client_secret || "";
      }

      async function fetchWithTimeout(
        url,
        options = {},
        timeoutMs = 8000,
        timeoutMessage = "request timeout",
        readResponse = null,
      ) {
        const controller = new AbortController();
        const timeout = window.setTimeout(() => controller.abort(), timeoutMs);
        try {
          const response = await fetch(url, { ...options, signal: controller.signal });
          const body = readResponse ? await readResponse(response) : null;
          return { response, body };
        } catch (err) {
          if (err && err.name === "AbortError") {
            throw new Error(timeoutMessage);
          }
          throw err;
        } finally {
          window.clearTimeout(timeout);
        }
      }

      function waitForRealtimeDataChannel(channel, timeoutMs = 7000) {
        if (channel.readyState === "open") {
          return Promise.resolve();
        }
        return new Promise((resolve, reject) => {
          const timeout = window.setTimeout(() => {
            cleanup();
            reject(new Error("data channel timeout"));
          }, timeoutMs);
          function cleanup() {
            window.clearTimeout(timeout);
            channel.removeEventListener("open", handleOpen);
            channel.removeEventListener("error", handleError);
          }
          function handleOpen() {
            cleanup();
            resolve();
          }
          function handleError() {
            cleanup();
            reject(new Error("data channel error"));
          }
          channel.addEventListener("open", handleOpen);
          channel.addEventListener("error", handleError);
        });
      }

      function settleRealtimePending(error) {
        const pending = state.realtimePending;
        if (!pending) {
          return;
        }
        state.realtimePending = null;
        window.clearTimeout(pending.timeout);
        if (error) {
          pending.reject(error);
          return;
        }
        pending.resolve();
      }

      function handleRealtimeEvent(event) {
        let payload;
        try {
          payload = JSON.parse(event.data);
        } catch {
          return;
        }

        if (payload.type === "error") {
          const message = payload.error?.message || "realtime error";
          settleRealtimePending(new Error(message));
          return;
        }

        if (payload.type === "response.done") {
          if (payload.response?.status === "failed") {
            settleRealtimePending(new Error("response failed"));
            return;
          }
          settleRealtimePending();
          return;
        }

        if (payload.type === "response.output_audio.done") {
          settleRealtimePending();
        }
      }

      function closeRealtimeVoiceSession() {
        settleRealtimePending(new Error("realtime session closed"));
        if (state.realtimeDataChannel) {
          try {
            state.realtimeDataChannel.close();
          } catch {}
        }
        if (state.realtimePc) {
          try {
            state.realtimePc.close();
          } catch {}
        }
        state.realtimePc = null;
        state.realtimeDataChannel = null;
        state.realtimeSessionPromise = null;
      }

      async function ensureRealtimeVoiceSession() {
        if (state.realtimeDisabled) {
          throw new Error("disabled");
        }
        if (state.realtimeDataChannel?.readyState === "open" && state.realtimePc) {
          return {
            pc: state.realtimePc,
            channel: state.realtimeDataChannel,
          };
        }
        if (state.realtimeSessionPromise) {
          return state.realtimeSessionPromise;
        }
        if (!window.RTCPeerConnection) {
          state.realtimeDisabled = true;
          throw new Error("WebRTC unsupported");
        }

        state.realtimeSessionPromise = (async () => {
          const { response: tokenResponse, body: tokenPayload } = await fetchWithTimeout(
            "/realtime/client-secret",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({}),
            },
            REALTIME_CLIENT_SECRET_TIMEOUT_MS,
            "session timeout",
            (response) => (response.ok ? response.json() : null),
          );
          if (!tokenResponse.ok) {
            state.realtimeDisabled = true;
            throw new Error(`session ${tokenResponse.status}`);
          }

          const clientSecret = getRealtimeSecretValue(tokenPayload);
          if (!clientSecret) {
            state.realtimeDisabled = true;
            throw new Error("missing client secret");
          }

          const pc = new RTCPeerConnection();
          const channel = pc.createDataChannel("oai-events");
          pc.addTransceiver("audio", { direction: "recvonly" });
          pc.ontrack = (trackEvent) => {
            const [stream] = trackEvent.streams;
            if (!stream) {
              return;
            }
            els.audio.removeAttribute("src");
            els.audio.srcObject = stream;
            els.audio.play().catch((err) => log(`realtime audio ${err.message}`));
          };
          channel.addEventListener("message", handleRealtimeEvent);
          channel.addEventListener("close", () => {
            if (state.realtimeDataChannel === channel) {
              state.realtimeDataChannel = null;
            }
          });
          state.realtimePc = pc;
          state.realtimeDataChannel = channel;

          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          const { response: sdpResponse, body: answerSdp } = await fetchWithTimeout(
            "https://api.openai.com/v1/realtime/calls",
            {
              method: "POST",
              body: offer.sdp,
              headers: {
                Authorization: `Bearer ${clientSecret}`,
                "Content-Type": "application/sdp",
              },
            },
            REALTIME_SDP_TIMEOUT_MS,
            "calls timeout",
            (response) => (response.ok ? response.text() : ""),
          );
          if (!sdpResponse.ok) {
            throw new Error(`calls ${sdpResponse.status}`);
          }
          await pc.setRemoteDescription({
            type: "answer",
            sdp: answerSdp,
          });
          await waitForRealtimeDataChannel(channel);

          log(`realtime voice ${tokenPayload.model || "connected"}`);
          return { pc, channel };
        })();

        try {
          return await state.realtimeSessionPromise;
        } catch (err) {
          state.realtimeDisabled = true;
          closeRealtimeVoiceSession();
          throw err;
        }
      }

      async function speakRealtime(text) {
        const line = String(text || "").trim();
        if (!line) {
          return;
        }
        const { channel } = await ensureRealtimeVoiceSession();
        if (channel.readyState !== "open") {
          throw new Error("data channel closed");
        }

        const event = JSON.stringify({
          type: "response.create",
          response: {
            conversation: "none",
            input: [
              {
                type: "message",
                role: "user",
                content: [
                  {
                    type: "input_text",
                    text: `Fetch dog line to speak verbatim:\n${line}`,
                  },
                ],
              },
            ],
            output_modalities: ["audio"],
            instructions: "Speak the provided Fetch dog line exactly once. Do not add anything before or after it.",
          },
        });
        const done = new Promise((resolve, reject) => {
          state.realtimePending = {
            resolve,
            reject,
            timeout: window.setTimeout(() => {
              settleRealtimePending(new Error("response timeout"));
            }, 12000),
          };
        });

        try {
          channel.send(event);
        } catch (err) {
          const error = err instanceof Error ? err : new Error("data channel send failed");
          const pending = state.realtimePending;
          if (pending) {
            state.realtimePending = null;
            window.clearTimeout(pending.timeout);
          }
          throw error;
        }
        await done;
      }

      function shouldUseRealtimeAudio() {
        return (
          state.realtimeAvailable &&
          state.audioRoute === "realtime_then_speak" &&
          !state.realtimeDisabled
        );
      }

      function ttsProviderFor(mode) {
        return mode === "openai_tts" ? "openai" : "gemini";
      }

      function audioModeLabel(mode) {
        if (mode === "live") return "Live";
        if (mode === "openai_tts") return "OpenAI TTS";
        return "Gemini TTS";
      }

      function loadAudioSettings() {
        try {
          const mode = localStorage.getItem("fetch.audioMode");
          const voice = localStorage.getItem("fetch.voice");
          const liveModel = localStorage.getItem("fetch.liveModel");
          if (mode && AUDIO_MODES.includes(mode)) state.audioMode = mode;
          if (voice) state.voice = voice;
          if (liveModel) {
            state.liveModel = liveModel;
            state.liveModelExplicit = true; // a stored value is an explicit user choice
          }
        } catch {}
      }

      function persistAudioSettings() {
        try {
          localStorage.setItem("fetch.audioMode", state.audioMode);
          localStorage.setItem("fetch.voice", state.voice);
          localStorage.setItem("fetch.liveModel", state.liveModel);
        } catch {}
      }

      function audioModeStatus(mode) {
        // {available, label} per mode. Live needs the conversation flag AND a
        // Gemini key; each TTS route needs its own provider key. The label tells
        // the user exactly what is missing rather than just greying the row out.
        if (mode === "live") {
          if (!state.conversationEnabled) return { available: false, label: "Server flag off" };
          if (!state.geminiAvailable) return { available: false, label: "Needs Gemini key" };
          return { available: true, label: "Ready" };
        }
        if (mode === "gemini_tts") {
          return state.geminiAvailable
            ? { available: true, label: "Ready" }
            : { available: false, label: "Needs Gemini key" };
        }
        if (mode === "openai_tts") {
          return state.openaiAvailable
            ? { available: true, label: "Ready" }
            : { available: false, label: "Needs OpenAI key" };
        }
        return { available: false, label: "Unavailable" };
      }

      function audioModeAvailable(mode) {
        return audioModeStatus(mode).available;
      }

      function defaultAudioMode() {
        if (state.conversationEnabled && state.geminiAvailable) return "live";
        if (state.ttsProvider === "openai" && state.openaiAvailable) return "openai_tts";
        if (state.ttsProvider === "gemini" && state.geminiAvailable) return "gemini_tts";
        if (state.geminiAvailable) return "gemini_tts";
        if (state.openaiAvailable) return "openai_tts";
        return state.ttsProvider === "openai" ? "openai_tts" : "gemini_tts";
      }

      function reconcileAudioMode() {
        // Keep a stored choice if it still works; otherwise pick the best mode
        // whose API key is actually present.
        if (!AUDIO_MODES.includes(state.audioMode) || !audioModeAvailable(state.audioMode)) {
          state.audioMode = defaultAudioMode();
        }
      }

      function refreshAudioModal() {
        if (!els.audioModal) return;
        AUDIO_MODES.forEach((mode) => {
          const radio = els.audioModal.querySelector(`input[value="${mode}"]`);
          if (!radio) return;
          const status = audioModeStatus(mode);
          radio.disabled = !status.available;
          const row = radio.closest(".audio-mode");
          if (row) row.classList.toggle("disabled", !status.available);
          const badge = els.audioModal.querySelector(`[data-mode-status="${mode}"]`);
          if (badge) {
            badge.textContent = status.label;
            badge.dataset.ready = String(status.available);
          }
        });
        const modeRadio = els.audioModal.querySelector(
          `input[name="audioMode"][value="${state.audioMode}"]`,
        );
        if (modeRadio) modeRadio.checked = true;
        if (els.audioVoice) els.audioVoice.value = state.voice;
        // Make sure the active model is selectable even if the server was
        // launched with a model that isn't one of the built-in options.
        if (els.audioLiveModel && state.liveModel) {
          const hasOption = [...els.audioLiveModel.options].some(
            (opt) => opt.value === state.liveModel,
          );
          if (!hasOption) {
            const opt = document.createElement("option");
            opt.value = state.liveModel;
            opt.textContent = state.liveModel;
            els.audioLiveModel.appendChild(opt);
          }
          els.audioLiveModel.value = state.liveModel;
        }
        // The live model only matters when Live is usable.
        const liveReady = audioModeStatus("live").available;
        const modelField = els.audioModal.querySelector("#audioModelField");
        if (els.audioLiveModel) els.audioLiveModel.disabled = !liveReady;
        if (modelField) modelField.classList.toggle("disabled", !liveReady);
        if (els.audioSettings) {
          els.audioSettings.textContent = `Audio: ${audioModeLabel(state.audioMode)}`;
        }
      }

      function openAudioModal() {
        refreshAudioModal();
        state.audioModalOpener = document.activeElement;
        els.audioModal.hidden = false;
        const focusTarget =
          els.audioModal.querySelector('input[name="audioMode"]:checked:not(:disabled)') ||
          els.audioModal.querySelector('input[name="audioMode"]:not(:disabled)') ||
          els.audioSave;
        if (focusTarget) focusTarget.focus();
      }

      function closeAudioModal() {
        els.audioModal.hidden = true;
        if (state.audioModalOpener && typeof state.audioModalOpener.focus === "function") {
          state.audioModalOpener.focus();
        }
        state.audioModalOpener = null;
      }

      function saveAudioSettings() {
        const checked = els.audioModal.querySelector('input[name="audioMode"]:checked');
        const wasLive = state.audioMode === "live";
        if (checked && AUDIO_MODES.includes(checked.value)) state.audioMode = checked.value;
        if (els.audioVoice) state.voice = els.audioVoice.value;
        if (els.audioLiveModel) {
          state.liveModel = els.audioLiveModel.value;
          state.liveModelExplicit = true; // user picked a model in the modal
        }
        reconcileAudioMode();
        persistAudioSettings();
        if (wasLive && state.audioMode !== "live" && state.conversationActive) {
          endConversation(true);
        }
        refreshAudioModal();
        closeAudioModal();
        log(`audio mode ${audioModeLabel(state.audioMode)}, voice ${state.voice}`);
      }

      async function speak(text = els.line.textContent) {
        if (!text) {
          return;
        }
        if (shouldUseRealtimeAudio()) {
          try {
            await speakRealtime(text);
            return;
          } catch (err) {
            log(`realtime ${err.message}; falling back to tts`);
          }
        }

        let response;
        try {
          response = await fetch("/speak", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              text,
              voice: state.voice,
              provider: ttsProviderFor(state.audioMode),
            }),
          });
        } catch (err) {
          log(`speech ${err.message}; using browser voice`);
          await speakBrowserFallback(text);
          return;
        }
        if (!response.ok) {
          let detail = `${response.status}`;
          try {
            const body = await response.json();
            detail = body.error || detail;
          } catch {
            detail = `${response.status}`;
          }
          log(`speech ${detail}; using browser voice`);
          await speakBrowserFallback(text);
          return;
        }
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        if (els.audio.src && els.audio.src.startsWith('blob:')) {
          URL.revokeObjectURL(els.audio.src);
        }
        els.audio.srcObject = null;
        els.audio.src = url;
        try {
          await els.audio.play();
          await waitForAudioEnded(els.audio);
        } catch (err) {
          log(`speech playback ${err.message}; using browser voice`);
          await speakBrowserFallback(text);
        }
      }

      async function speakBrowserFallback(text) {
        if (!("speechSynthesis" in window) || !window.SpeechSynthesisUtterance) {
          log("browser voice unavailable");
          return;
        }
        await new Promise((resolve) => {
          const utterance = new SpeechSynthesisUtterance(text);
          let settled = false;
          const finish = () => {
            if (settled) {
              return;
            }
            settled = true;
            window.clearTimeout(timeout);
            resolve();
          };
          const timeout = window.setTimeout(finish, Math.max(5000, text.length * 120));
          utterance.rate = 0.95;
          utterance.pitch = 1.05;
          utterance.onend = finish;
          utterance.onerror = finish;
          window.speechSynthesis.cancel();
          window.speechSynthesis.speak(utterance);
        });
      }

      function waitForAudioEnded(audio, timeoutMs = 20000) {
        return new Promise((resolve) => {
          let settled = false;
          const finish = () => {
            if (settled) {
              return;
            }
            settled = true;
            window.clearTimeout(timeout);
            audio.removeEventListener("ended", finish);
            audio.removeEventListener("error", finish);
            resolve();
          };
          const timeout = window.setTimeout(finish, timeoutMs);
          audio.addEventListener("ended", finish);
          audio.addEventListener("error", finish);
        });
      }

      async function playPrintSound() {
        const audio = els.printAudio || new Audio(PRINT_SOUND_SRC);
        audio.pause();
        audio.currentTime = 0;
        audio.volume = 0.9;
        try {
          await audio.play();
          log("camera print sound");
          await waitForAudioEnded(audio, 4000);
        } catch (err) {
          log(`print sound ${err.message}`);
        }
      }

      async function savePhoto(payload) {
        const response = await fetch("/photos/save", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!response.ok) {
          throw new Error(`save photo ${response.status}`);
        }
        return response.json();
      }

      async function snapPhoto() {
        if (state.visionSource === "dog") {
          const saved = await savePhoto({ source: "dog" });
          const url = `${saved.url}?ts=${Date.now()}`;
          await showPhotoResult(url);
          log(`dog photo saved ${saved.icloud_path || saved.path || ""}`);
          return;
        }
        if (state.visionSource === "record3d") {
          const saved = await savePhoto({ source: "record3d" });
          const url = `${saved.url}?ts=${Date.now()}`;
          await showPhotoResult(url);
          log(`record3d photo saved ${saved.icloud_path || saved.path || ""}`);
          return;
        }
        if (!els.video.videoWidth) {
          return;
        }
        const dataUrl = captureDataUrl(1024);
        const saved = await savePhoto({ image_data_url: dataUrl });
        const url = `${saved.url}?ts=${Date.now()}`;
        await showPhotoResult(url);
        log(`photo saved ${saved.icloud_path || saved.path || ""}`);
      }

      function dance() {
        document.body.classList.add("dancing");
        els.motion.textContent = "dance";
        window.setTimeout(() => document.body.classList.remove("dancing"), 1800);
      }

      function ensureAudioContext() {
        if (!state.audioContext) {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          state.audioContext = new Ctx();
        }
        return state.audioContext;
      }

      function floatToInt16(input) {
        const out = new Int16Array(input.length);
        for (let i = 0; i < input.length; i++) {
          const s = Math.max(-1, Math.min(1, input[i]));
          out[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
        }
        return out;
      }

      function downsampleTo16k(input, inRate, outRate) {
        if (outRate >= inRate) {
          return floatToInt16(input);
        }
        const ratio = inRate / outRate;
        const newLen = Math.floor(input.length / ratio);
        const out = new Int16Array(newLen);
        for (let i = 0; i < newLen; i++) {
          const start = Math.floor(i * ratio);
          const end = Math.min(input.length, Math.floor((i + 1) * ratio));
          let sum = 0;
          let count = 0;
          for (let j = start; j < end; j++) {
            sum += input[j];
            count += 1;
          }
          const sample = count ? sum / count : 0;
          const s = Math.max(-1, Math.min(1, sample));
          out[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
        }
        return out;
      }

      function int16ToBase64(int16) {
        const bytes = new Uint8Array(int16.buffer, int16.byteOffset, int16.byteLength);
        let binary = "";
        const chunk = 0x8000;
        for (let i = 0; i < bytes.length; i += chunk) {
          binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
        }
        return btoa(binary);
      }

      function base64ToInt16(b64) {
        let binary;
        try {
          binary = atob(b64 || "");
        } catch {
          return new Int16Array(0);
        }
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }
        return new Int16Array(bytes.buffer, 0, Math.floor(bytes.byteLength / 2));
      }

      async function startMic() {
        if (state.micStream) {
          return;
        }
        let micStream = null;
        try {
          micStream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: true,
            },
            video: false,
          });
          // Only mark the mic as ready once capture is actually wired up, so a
          // failure here leaves state.micStream null and beginOffer falls back
          // to the scripted offer instead of opening a silent live session.
          await initMicCapture(micStream);
          state.micStream = micStream;
          log("mic ready");
        } catch (err) {
          log(`mic ${err.message}`);
          if (micStream) {
            micStream.getTracks().forEach((track) => track.stop());
          }
          stopMic();
        }
      }

      function stopMic() {
        if (state.micWorkletNode) {
          try { state.micWorkletNode.disconnect(); } catch {}
          state.micWorkletNode = null;
        }
        if (state.micScriptNode) {
          try { state.micScriptNode.disconnect(); } catch {}
          state.micScriptNode = null;
        }
        if (state.micSource) {
          try { state.micSource.disconnect(); } catch {}
          state.micSource = null;
        }
        if (state.micStream) {
          state.micStream.getTracks().forEach((track) => track.stop());
          state.micStream = null;
        }
      }

      async function initMicCapture(stream) {
        const ctx = ensureAudioContext();
        if (ctx.state === "suspended") {
          try { await ctx.resume(); } catch {}
        }
        const source = ctx.createMediaStreamSource(stream);
        state.micSource = source;
        const inRate = ctx.sampleRate;

        const sendChunk = (float32) => {
          if (!state.conversationActive) {
            return;
          }
          if (state.echoSuppress && state.echoGate) {
            return;
          }
          const pcm16 = downsampleTo16k(float32, inRate, MIC_TARGET_RATE);
          if (!pcm16.length) {
            return;
          }
          if (state.ws && state.ws.readyState === WebSocket.OPEN) {
            state.ws.send(JSON.stringify({
              type: "mic_chunk",
              data: int16ToBase64(pcm16),
              ts: Date.now(),
            }));
          }
        };

        if (ctx.audioWorklet) {
          try {
            const processorCode = `
              class MicProcessor extends AudioWorkletProcessor {
                constructor() {
                  super();
                  this._chunks = [];
                  this._count = 0;
                  this._target = Math.floor(sampleRate * 0.1);
                }
                process(inputs) {
                  const input = inputs[0];
                  if (input && input[0]) {
                    this._chunks.push(input[0].slice(0));
                    this._count += input[0].length;
                    if (this._count >= this._target) {
                      const merged = new Float32Array(this._count);
                      let offset = 0;
                      for (const chunk of this._chunks) { merged.set(chunk, offset); offset += chunk.length; }
                      this.port.postMessage(merged);
                      this._chunks = [];
                      this._count = 0;
                    }
                  }
                  return true;
                }
              }
              registerProcessor('mic-processor', MicProcessor);
            `;
            const blob = new Blob([processorCode], { type: "application/javascript" });
            const url = URL.createObjectURL(blob);
            try {
              await ctx.audioWorklet.addModule(url);
            } finally {
              URL.revokeObjectURL(url);
            }
            const node = new AudioWorkletNode(ctx, "mic-processor");
            node.port.onmessage = (event) => sendChunk(event.data);
            source.connect(node);
            const sink = ctx.createGain();
            sink.gain.value = 0;
            node.connect(sink);
            sink.connect(ctx.destination);
            state.micWorkletNode = node;
            return;
          } catch (err) {
            log(`worklet ${err.message}; using fallback capture`);
          }
        }

        const node = ctx.createScriptProcessor(4096, 1, 1);
        node.onaudioprocess = (event) => sendChunk(event.inputBuffer.getChannelData(0));
        source.connect(node);
        // Route through a muted gain node: a ScriptProcessor must stay connected
        // to a destination to keep firing, but we don't want to monitor the mic.
        const sink = ctx.createGain();
        sink.gain.value = 0;
        node.connect(sink);
        sink.connect(ctx.destination);
        state.micScriptNode = node;
      }

      function handleAudioOut(message) {
        const ctx = ensureAudioContext();
        if (ctx.state === "suspended") {
          ctx.resume().catch(() => {});
        }
        const int16 = base64ToInt16(message.data || "");
        if (!int16.length) {
          return;
        }
        const float32 = new Float32Array(int16.length);
        for (let i = 0; i < int16.length; i++) {
          float32[i] = int16[i] / 32768;
        }
        const buffer = ctx.createBuffer(1, float32.length, state.playbackSampleRate);
        buffer.copyToChannel(float32, 0);
        const src = ctx.createBufferSource();
        src.buffer = buffer;
        src.connect(ctx.destination);
        const now = ctx.currentTime;
        let startAt = state.playbackTime;
        if (startAt < now + 0.02) {
          startAt = now + 0.02;
        }
        src.start(startAt);
        state.playbackTime = startAt + buffer.duration;
        state.playbackSources.push(src);
        state.echoGate = true;
        src.onended = () => {
          state.playbackSources = state.playbackSources.filter((s) => s !== src);
          if (state.playbackSources.length === 0) {
            state.echoGate = false;
          }
        };
      }

      function handleInterrupted() {
        for (const src of state.playbackSources) {
          try { src.stop(); } catch {}
        }
        state.playbackSources = [];
        state.playbackTime = 0;
        state.echoGate = false;
      }

      function handleTranscript(message) {
        if (!message.text) {
          return;
        }
        const who = message.speaker === "user" ? "you" : "dog";
        log(`${who}: ${message.text}`);
        if (message.speaker === "dog") {
          els.line.textContent = message.text;
        }
      }

      async function handleConversationState(message) {
        const conversationState = message.state;
        if (conversationState === "active") {
          log("conversation active");
          return;
        }
        if (conversationState === "take_photo") {
          const now = Date.now();
          if (now - state.lastPhotoAt < 8000 || state.photoInProgress) {
            return;
          }
          state.lastPhotoAt = now;
          state.photoInProgress = true;
          try {
            await snapPhoto();
            await playPrintSound();
            log("conversation photo saved");
          } catch (err) {
            log(`photo ${err.message}`);
          } finally {
            state.photoInProgress = false;
          }
          return;
        }
        if (conversationState === "celebrate") {
          dance();
          log("conversation celebrate");
          endConversation(false);
          return;
        }
        if (conversationState === "reset") {
          log(`conversation reset ${(message.data && message.data.reason) || ""}`);
          endConversation(false);
          return;
        }
      }

      function endConversation(notifyServer = false) {
        if (notifyServer && state.ws && state.ws.readyState === WebSocket.OPEN) {
          try { state.ws.send(JSON.stringify({ type: "conversation_stop" })); } catch {}
        }
        state.conversationActive = false;
        stopMic();
        handleInterrupted();
        if (state.scanning) {
          setWorkflow("find_guest", "Looking for the next customer.");
        } else {
          state.workflow = "find_guest";
        }
      }

      async function robotAction(payload) {
        try {
          const response = await fetch("/robot/action", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const result = await response.json();
          if (result.enabled === false) {
            return result;
          }
          log(`robot ${payload.action}: ${result.ok ? "ok" : result.message || "failed"}`);
          return result;
        } catch (err) {
          log(`robot ${payload.action} ${err.message}`);
          return { ok: false };
        }
      }

      async function robotPreflight() {
        try {
          const response = await fetch("/robot/preflight", { method: "POST" });
          const result = await response.json();
          if (result.enabled === false) {
            log("robot preflight skipped");
            return result;
          }
          log(`robot preflight: ${result.ok ? "ok" : "failed"}`);
          return result;
        } catch (err) {
          log(`robot preflight ${err.message}`);
          return { ok: false };
        }
      }

      function startRobotPreflight() {
        if (state.robotPreflightPromise) {
          return state.robotPreflightPromise;
        }
        if (!state.scanning) {
          els.line.textContent = "I’m stretching, balancing, and getting camera-ready.";
        }
        state.robotPreflightPromise = robotPreflight().then((result) => {
          state.robotPreflightComplete = Boolean(result && result.ok);
          if (!state.scanning) {
            els.line.textContent = state.robotPreflightComplete
              ? "I’m ready. Hit Record and I’ll scout for a Coke/photo star."
              : "I’m still getting my paws steady. Hit Record once my dog-cam is live.";
          }
          if (!state.robotPreflightComplete) {
            state.robotPreflightPromise = null;
          }
          return result;
        });
        return state.robotPreflightPromise;
      }

      function sourceFromHealth(health) {
        if (health.vision_source) {
          return health.vision_source;
        }
        if (health.dog_enabled || health.robot_enabled) {
          return "dog";
        }
        if (health.record3d_enabled) {
          return "record3d";
        }
        return "browser";
      }

      async function loadHealth() {
        const response = await fetch("/health");
        if (!response.ok) {
          throw new Error(`health ${response.status}`);
        }
        return response.json();
      }

      async function selectVisionSource() {
        const health = await loadHealth();
        const source = sourceFromHealth(health);
        setVisionSource(source);
        return source;
      }

      function refreshDogPreview() {
        if (state.visionSource !== "dog") {
          return;
        }
        state.dogCameraLive = true;
        els.dogPreview.src = `/dog/stream.mjpg?ts=${Date.now()}`;
      }

      function showDogPlaceholder() {
        state.dogCameraLive = false;
        state.dogLidarLive = false;
        els.dogPreview.src = DOG_PLACEHOLDER_SRC;
        els.dogLidarPreview.removeAttribute("src");
        els.dogLidarPreview.hidden = true;
        els.dogLidarPreview.closest(".dog-lidar-pane")?.classList.remove("has-lidar");
      }

      function refreshRecord3dPreview() {
        if (state.visionSource !== "record3d") {
          return;
        }
        els.record3dPreview.src = `/record3d/stream.mjpg?ts=${Date.now()}`;
        els.depthPreview.src = `/record3d/stream-depth.mjpg?ts=${Date.now()}`;
      }

      function setVisionSource(source) {
        state.visionSource = source;
        document.body.classList.toggle("dog-mode", source === "dog");
        document.body.classList.toggle("record3d-mode", source === "record3d");
        els.sourceLabel.textContent =
          source === "dog" ? "Go2 WebRTC" : source === "record3d" ? "Record3D RGBD" : "Local camera";
        renderStatus();

        if (source === "dog") {
          showDogPlaceholder();
        } else if (source === "record3d") {
          refreshRecord3dPreview();
        }
      }

      function applyDogStatus(status) {
        if (!status.enabled) {
          els.rgbdStatus.textContent = "dog off";
          state.dogConnectionActive = false;
          state.dogCameraStreaming = false;
          renderStatus();
          return;
        }

        state.lastDogFrames = status.frames_received || 0;
        state.lastDogLidarFrames = status.lidar_frames_received || 0;
        state.dogConnectionActive = Boolean(status.connected);
        state.dogCameraStreaming = Boolean(status.streaming);
        renderStatus();
        if (state.visionSource === "dog" && state.scanning && status.streaming && !state.dogCameraLive) {
          refreshDogPreview();
        } else if (state.visionSource === "dog" && !status.streaming && state.dogCameraLive) {
          showDogPlaceholder();
        }
        state.dogLidarLive = Boolean(status.lidar_streaming);
        if (state.dogLidarLive && !els.dogLidarPreview.src) {
          els.dogLidarPreview.src = `/dog/lidar-stream.mjpg?ts=${Date.now()}`;
        } else if (!state.dogLidarLive) {
          els.dogLidarPreview.removeAttribute("src");
        }
        els.dogLidarPreview.hidden = !state.dogLidarLive;
        els.dogLidarPreview.closest(".dog-lidar-pane")?.classList.toggle("has-lidar", state.dogLidarLive);
        const cameraStatus = status.streaming
          ? `cam ${state.lastDogFrames}`
          : status.stale
            ? "cam stale"
            : status.waiting_for_frames
              ? "cam waiting"
              : status.last_error
                ? "cam error"
                : "cam idle";
        const lidarStatus = status.lidar_streaming
          ? `lidar ${state.lastDogLidarFrames}`
          : status.lidar_stale
            ? "lidar stale"
            : status.waiting_for_lidar
              ? "lidar waiting"
              : status.lidar_last_error
                ? "lidar error"
                : "lidar idle";
        els.rgbdStatus.textContent = `${cameraStatus} / ${lidarStatus}`;

        if (state.scanning && !status.streaming) {
          els.line.textContent = "I’m waiting for my dog-cam to come online.";
        }
      }

      function applyRecord3dStatus(status) {
        if (!status.enabled) {
          els.rgbdStatus.textContent = "rgbd off";
          return;
        }

        state.lastRecord3dFrames = status.frames_received || 0;
        if (status.streaming) {
          els.rgbdStatus.textContent = `rgbd ${state.lastRecord3dFrames}`;
          return;
        }

        if (status.stale) {
          els.rgbdStatus.textContent = "rgbd stale";
          els.line.textContent = "Record3D is connected but the frame stream is stale. Tap Start again, then restart streaming in Record3D if needed.";
          return;
        }

        if (status.waiting_for_frames) {
          els.rgbdStatus.textContent = "rgbd waiting";
          els.line.textContent = "Record3D is connected but not streaming frames. Tap the red streaming toggle in the Record3D app.";
          return;
        }

        els.rgbdStatus.textContent = status.last_error ? "rgbd error" : "rgbd idle";
      }

      async function pollDogStatus() {
        try {
          const response = await fetch("/dog/status");
          applyDogStatus(await response.json());
        } catch (err) {
          els.rgbdStatus.textContent = "dog status error";
        }
      }

      async function pollRecord3dStatus() {
        try {
          const response = await fetch("/record3d/status");
          applyRecord3dStatus(await response.json());
        } catch (err) {
          els.rgbdStatus.textContent = "rgbd status error";
        }
      }

      async function pollVisionStatus() {
        if (state.visionSource === "dog") {
          await pollDogStatus();
        } else if (state.visionSource === "record3d") {
          await pollRecord3dStatus();
        }
      }

      function startVisionStatusPolling() {
        if (state.statusTimer) {
          window.clearInterval(state.statusTimer);
        }
        state.statusTimer = window.setInterval(pollVisionStatus, 1500);
      }

      async function enableDog() {
        const response = await fetch("/dog/status");
        const status = await response.json();
        if (!status.enabled) {
          throw new Error("Go2 camera is not enabled on the server");
        }

        setVisionSource("dog");
        applyDogStatus(status);
        log(`dog enabled, camera ${status.frames_received || 0}, lidar ${status.lidar_frames_received || 0}`);
      }

      async function enableRecord3d() {
        const response = await fetch("/record3d/status");
        const status = await response.json();
        if (!status.enabled) {
          throw new Error("Record3D is not enabled on the server");
        }

        setVisionSource("record3d");
        applyRecord3dStatus(status);
        log(`record3d enabled, frames ${status.frames_received || 0}`);
      }

      async function restartRecord3d() {
        const response = await fetch("/record3d/restart", { method: "POST" });
        const status = await response.json();
        applyRecord3dStatus(status);
        log("record3d receiver restarted");
      }

      function sleep(ms) {
        return new Promise((resolve) => window.setTimeout(resolve, ms));
      }

      async function ensureDogReady() {
        let status = null;
        for (let attempt = 0; attempt < 12; attempt += 1) {
          const response = await fetch("/dog/status");
          status = await response.json();
          if (!status.enabled) {
            throw new Error("Go2 camera is not enabled on the server");
          }
          applyDogStatus(status);
          if (status.streaming) {
            if (!status.lidar_streaming) {
              log("Go2 LiDAR is not streaming yet; continuing with camera only");
            }
            return true;
          }
          await sleep(500);
        }

        const cameraReady = status && status.streaming;
        const lidarReady = status && status.lidar_streaming;
        if (!cameraReady) {
          throw new Error("Go2 WebRTC camera is not streaming yet");
        }
        if (!lidarReady) {
          log("Go2 LiDAR is not streaming yet; continuing with camera only");
        }
        return true;
      }

      async function ensureRecord3dReady() {
        let response = await fetch("/record3d/status");
        let status = await response.json();
        if (!status.enabled) {
          throw new Error("Record3D is not enabled on the server");
        }

        if (status.waiting_for_frames || status.stale || status.last_error || !status.frames_received) {
          await restartRecord3d();
          await sleep(900);
          response = await fetch("/record3d/status");
          status = await response.json();
        }

        applyRecord3dStatus(status);
        if (!status.streaming) {
          log("Waiting for Record3D frames before scanning");
        }
        return status.streaming;
      }

      function setRunningUi(running) {
        els.recordToggle.dataset.running = String(running);
        els.recordToggle.textContent = running ? "Recording" : "Record";
        if (running) {
          setStatus("running");
        } else if (state.ws && state.ws.readyState === WebSocket.OPEN) {
          setStatus("connected");
        } else {
          setStatus("offline");
        }
      }

      async function startAutomation() {
        const source = await selectVisionSource();
        if (source === "dog") {
          await enableDog();
          await ensureDogReady();
          await startRobotPreflight();
          refreshDogPreview();
        } else if (source === "record3d") {
          await enableRecord3d();
          await ensureRecord3dReady();
        } else {
          await startCamera();
        }
        startVisionStatusPolling();
        if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
          connect();
        }
        state.scanning = true;
        state.workflow = "find_guest";
        setRunningUi(true);
        els.line.textContent = "Hunting for a photogenic target.";
        log("auto scan started: every 1s");
        sendFrame();
        if (state.timer) {
          window.clearInterval(state.timer);
        }
        state.timer = window.setInterval(sendFrame, SCAN_INTERVAL_MS);
      }

      function stopAutomation() {
        state.scanning = false;
        state.workflow = "find_guest";
        setScanPending(false);
        if (state.conversationActive) {
          endConversation(true);
        }
        closeRealtimeVoiceSession();
        if (state.timer) {
          window.clearInterval(state.timer);
          state.timer = null;
        }
        setRunningUi(false);
        if (state.visionSource === "dog") {
          showDogPlaceholder();
        }
        log("auto scan stopped");
      }

      function toggleAutomation() {
        if (state.scanning) {
          stopAutomation();
          return;
        }
        startAutomation().catch((err) => log(err.message));
      }

      async function init() {
        try {
          const source = await selectVisionSource();
          if (source === "dog") {
            connect();
            await pollDogStatus();
            startVisionStatusPolling();
            startRobotPreflight();
            log("dog mode selected from health");
          } else if (source === "record3d") {
            connect();
            await pollRecord3dStatus();
            startVisionStatusPolling();
            log("record3d mode selected from health");
          } else {
            els.rgbdStatus.textContent = "camera idle";
            log("browser camera mode selected from health");
          }
        } catch (err) {
          log(`init ${err.message}`);
        }
      }

      els.recordToggle.addEventListener("click", toggleAutomation);
      window.addEventListener("beforeunload", closeRealtimeVoiceSession);
      els.photoPreview.addEventListener("error", () => {
        els.photoPreview.removeAttribute("src");
        log("photo unavailable");
      });
      els.audioSettings.addEventListener("click", openAudioModal);
      els.audioSave.addEventListener("click", saveAudioSettings);
      els.audioModal.addEventListener("click", (event) => {
        if (event.target.dataset && event.target.dataset.close) {
          closeAudioModal();
        }
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !els.audioModal.hidden) {
          closeAudioModal();
        }
      });
      loadAudioSettings();
      // Don't reconcile yet: provider availability is unknown until the hello
      // message arrives, which reconciles against the real keys. Keep any stored
      // choice (or a provisional default) so we don't clobber it prematurely.
      if (!AUDIO_MODES.includes(state.audioMode)) {
        state.audioMode = "gemini_tts";
      }
      refreshAudioModal();
      setRunningUi(false);
      init();
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Fetch</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="stylesheet" href="https://unpkg.com/@blueprintjs/icons@5/lib/css/blueprint-icons.css" />
    <link rel="stylesheet" href="https://unpkg.com/@blueprintjs/core@5/lib/css/blueprint.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mr+Dafoe&family=Rajdhani:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --ink: #14212b;
        --muted: #62707b;
        --line: #d8e0e5;
        --bg: #f7f9f8;
        --panel: #ffffff;
        --aqua: #087d8c;
        --coral: #c95d3f;
        --lime: #778b22;
        --sand: #e7d29c;
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: max(12px, env(safe-area-inset-top)) 16px 12px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.92);
        position: sticky;
        top: 0;
        z-index: 4;
        backdrop-filter: blur(12px);
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      .status {
        min-width: 96px;
        padding: 6px 9px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--muted);
        font-size: 12px;
        text-align: center;
        background: #fff;
      }

      main {
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) minmax(280px, 0.9fr);
        gap: 16px;
        padding: 16px;
      }

      .stage {
        display: grid;
        gap: 12px;
        min-width: 0;
      }

      .video-shell {
        position: relative;
        overflow: hidden;
        border-radius: 8px;
        background: #0f171a;
        aspect-ratio: 4 / 3;
        border: 1px solid #0f171a;
      }

      video,
      .dog-preview,
      .dog-lidar-preview,
      .record3d-preview,
      .depth-preview,
      .photo img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .rgbd-grid,
      .dog-grid,
      .dog-preview,
      .dog-lidar-preview,
      .record3d-preview,
      .depth-preview {
        display: none;
      }

      body.record3d-mode video {
        display: none;
      }

      body.dog-mode video,
      body.dog-mode .rgbd-grid,
      body.dog-mode .idle-feed {
        display: none;
      }

      body.dog-mode .dog-grid {
        display: grid;
      }

      body.dog-mode .dog-preview,
      body.dog-mode .dog-lidar-preview {
        display: block;
      }

      body.record3d-mode .rgbd-grid {
        display: grid;
      }

      body.record3d-mode .record3d-preview,
      body.record3d-mode .depth-preview {
        display: block;
      }

      .video-overlay {
        position: absolute;
        left: 12px;
        bottom: 12px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .chip {
        border-radius: 8px;
        padding: 6px 8px;
        background: rgba(255, 255, 255, 0.9);
        color: var(--ink);
        font-size: 12px;
        border: 1px solid rgba(20, 33, 43, 0.12);
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      button {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        font-size: 14px;
        font-weight: 650;
        touch-action: manipulation;
      }

      button.primary {
        background: var(--aqua);
        border-color: var(--aqua);
        color: #fff;
      }

      button.warn {
        border-color: rgba(201, 93, 63, 0.45);
        color: var(--coral);
      }

      button:disabled {
        opacity: 0.55;
      }

      aside {
        display: grid;
        align-content: start;
        gap: 12px;
      }

      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 12px;
      }

      h2 {
        margin: 0 0 10px;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0;
        color: var(--muted);
      }

      dl {
        display: grid;
        grid-template-columns: 94px minmax(0, 1fr);
        gap: 8px 10px;
        margin: 0;
        font-size: 14px;
      }

      dt {
        color: var(--muted);
      }

      dd {
        margin: 0;
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .line {
        margin: 0;
        min-height: 52px;
        font-size: 24px;
        line-height: 1.35;
      }

      .toggles {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-size: 14px;
      }

      label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      input[type="checkbox"] {
        width: 22px;
        height: 22px;
        accent-color: var(--aqua);
      }

      .photo {
        display: grid;
        gap: 8px;
      }

      .photo-frame {
        aspect-ratio: 1 / 1;
        background:
          linear-gradient(#fff 0 0) padding-box,
          linear-gradient(135deg, var(--sand), var(--aqua), var(--coral)) border-box;
        border: 8px solid transparent;
        border-bottom-width: 30px;
        border-radius: 3px;
        overflow: hidden;
      }

      .photo a {
        color: var(--aqua);
        font-size: 14px;
        font-weight: 650;
        text-decoration: none;
      }

      .log {
        max-height: 148px;
        overflow: auto;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      @media (max-width: 820px) {
        main {
          grid-template-columns: 1fr;
          padding: 12px;
        }

        .controls {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      :root {
        color-scheme: dark;
        --ink: oklch(91% 0.018 105);
        --muted: oklch(69% 0.023 175);
        --faint: oklch(49% 0.019 175);
        --line: oklch(32% 0.018 175);
        --line-strong: oklch(45% 0.025 175);
        --bg: oklch(13% 0.012 175);
        --panel: oklch(19.5% 0.017 175);
        --panel-strong: oklch(22% 0.018 175);
        --accent: oklch(72% 0.11 170);
        --accent-ink: oklch(13% 0.018 175);
        --amber: oklch(79% 0.13 78);
        --danger: oklch(67% 0.17 28);
        --ok: oklch(72% 0.14 150);
        --shadow: 0 22px 60px oklch(7% 0.018 175 / 0.48);
        --space-xs: 8px;
        --space-sm: 12px;
        --space-md: 16px;
        --space-lg: 24px;
        --radius: 8px;
        --font-body: "Source Sans 3", "Segoe UI", sans-serif;
        --font-display: "Rajdhani", "Aptos Display", sans-serif;
        --font-logo: "Mr Dafoe", "Brush Script MT", cursive;
      }

      html {
        min-height: 100%;
        background: var(--bg);
      }

      body {
        background:
          radial-gradient(circle at 55% -18%, oklch(35% 0.045 165 / 0.28), transparent 34rem),
          linear-gradient(oklch(18% 0.014 175 / 0.9), oklch(11% 0.012 175 / 0.96)),
          repeating-linear-gradient(
            90deg,
            oklch(100% 0 0 / 0.026) 0,
            oklch(100% 0 0 / 0.026) 1px,
            transparent 1px,
            transparent 46px
          ),
          repeating-linear-gradient(
            0deg,
            oklch(100% 0 0 / 0.018) 0,
            oklch(100% 0 0 / 0.018) 1px,
            transparent 1px,
            transparent 46px
          ),
          var(--bg);
        color: var(--ink);
        font-family: var(--font-body);
        font-size: 15px;
        height: 100dvh;
        overflow: hidden;
      }

      header {
        gap: var(--space-lg);
        padding: max(var(--space-sm), env(safe-area-inset-top)) var(--space-lg) var(--space-sm);
        border-bottom: 1px solid var(--line);
        background: oklch(14% 0.014 175 / 0.88);
        z-index: 8;
        backdrop-filter: blur(18px);
      }

      h1 {
        font-family: var(--font-display);
        font-size: 26px;
        font-weight: 700;
        line-height: 0.95;
      }

      h2 {
        margin: 0;
      }

      .brand {
        display: grid;
        gap: 6px;
        min-width: 0;
      }

      .eyebrow,
      .panel-title,
      .feed-label,
      dt {
        color: var(--faint);
        font-family: var(--font-display);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.06em;
        line-height: 1;
        text-transform: uppercase;
      }

      .header-metrics {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: var(--space-xs);
        min-width: 0;
      }

      .record-toggle {
        min-width: 112px;
        min-height: 42px;
        padding: 8px 12px;
        border: 1px solid color-mix(in oklch, var(--danger) 78%, transparent);
        border-radius: var(--radius);
        background: oklch(16% 0.016 20 / 0.82);
        color: oklch(91% 0.035 30);
      }

      .record-toggle::before {
        display: inline-block;
        width: 10px;
        height: 10px;
        margin-right: 8px;
        border-radius: 50%;
        background: var(--danger);
        box-shadow: 0 0 0 3px color-mix(in oklch, var(--danger) 24%, transparent);
        content: "";
      }

      .record-toggle[data-running="true"] {
        animation: record-pulse 1.1s ease-in-out infinite;
        background: linear-gradient(180deg, oklch(42% 0.16 28), oklch(27% 0.11 28));
        color: white;
      }

      @keyframes record-pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 color-mix(in oklch, var(--danger) 38%, transparent);
        }
        50% {
          box-shadow: 0 0 0 6px color-mix(in oklch, var(--danger) 0%, transparent);
        }
      }

      .status {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-width: 112px;
        min-height: 42px;
        padding: 8px 12px;
        border: 1px solid var(--line-strong);
        background: oklch(18% 0.018 175);
        color: var(--muted);
        font-family: var(--font-display);
        font-size: 13px;
        font-weight: 700;
        line-height: 1;
        text-transform: uppercase;
      }

      .status::before {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--faint);
        box-shadow: 0 0 0 4px color-mix(in oklch, var(--faint) 18%, transparent);
        content: "";
      }

      .status[data-state~="connected"]::before,
      .status[data-state~="camera"]::before,
      .status[data-state~="running"]::before {
        background: var(--ok);
        box-shadow: 0 0 0 4px color-mix(in oklch, var(--ok) 18%, transparent);
      }

      .status[data-state~="connecting"]::before,
      .status[data-state~="error"]::before,
      .status[data-state~="dog-offline"]::before {
        background: var(--amber);
        box-shadow: 0 0 0 4px color-mix(in oklch, var(--amber) 18%, transparent);
      }

      main {
        grid-template-columns: minmax(0, 1.45fr) minmax(328px, 0.8fr);
        gap: var(--space-lg);
        padding: var(--space-lg);
        height: calc(100dvh - 98px);
        min-height: 0;
        overflow: hidden;
      }

      .stage {
        align-content: start;
        grid-template-rows: auto minmax(0, 1fr) minmax(104px, 0.24fr);
        gap: var(--space-sm);
        min-height: 0;
      }

      .stage-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-md);
        min-height: 44px;
        padding: 0 var(--space-xs);
      }

      .feed-meta {
        display: flex;
        align-items: center;
        gap: var(--space-xs);
        min-width: 0;
        color: var(--muted);
        font-size: 13px;
      }

      .feed-meta .bp5-icon {
        color: var(--accent);
      }

      .video-shell {
        min-height: 0;
        height: 100%;
        border: 1px solid var(--line-strong);
        border-radius: var(--radius);
        background:
          linear-gradient(135deg, oklch(8% 0.015 175), oklch(14% 0.02 175)),
          var(--bg);
        aspect-ratio: auto;
        box-shadow: var(--shadow);
      }

      .video-shell::before {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        background:
          linear-gradient(90deg, oklch(100% 0 0 / 0.05) 1px, transparent 1px),
          linear-gradient(0deg, oklch(100% 0 0 / 0.045) 1px, transparent 1px);
        background-size: 80px 80px;
        mix-blend-mode: screen;
        opacity: 0.34;
        content: "";
      }

      .video-shell::after {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        border: 1px solid oklch(100% 0 0 / 0.1);
        border-radius: inherit;
        box-shadow: inset 0 0 80px oklch(0% 0 0 / 0.46);
        content: "";
      }

      .rgbd-grid,
      .dog-grid {
        position: absolute;
        inset: 0;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 1px;
        background: var(--line);
      }

      .rgbd-pane,
      .dog-pane {
        position: relative;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        background: oklch(8% 0.015 175);
      }

      .rgbd-pane .stream-label,
      .dog-pane .stream-label {
        position: absolute;
        top: var(--space-sm);
        left: var(--space-sm);
        z-index: 3;
        border: 1px solid oklch(100% 0 0 / 0.14);
        border-radius: 6px;
        padding: 5px 8px;
        background: oklch(10% 0.014 175 / 0.72);
        color: oklch(98% 0.012 195);
        font-family: var(--font-display);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      body.dog-mode .dog-grid {
        background: transparent;
      }

      body.dog-mode .dog-camera-pane {
        position: absolute;
        inset: 0;
        z-index: 0;
      }

      body.dog-mode .dog-lidar-pane {
        position: absolute;
        top: var(--space-md);
        right: var(--space-md);
        z-index: 4;
        width: clamp(150px, 22%, 260px);
        aspect-ratio: 1;
        border: 1px solid oklch(100% 0 0 / 0.18);
        border-radius: 8px;
        box-shadow:
          0 18px 52px oklch(0% 0 0 / 0.46),
          inset 0 0 0 1px oklch(100% 0 0 / 0.08);
        background: oklch(8% 0.015 175 / 0.84);
      }

      body.dog-mode .dog-lidar-pane .stream-label {
        top: 8px;
        left: 8px;
      }

      .dog-lidar-empty {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 38px 14px 14px;
        color: oklch(90% 0.03 195 / 0.72);
        font-family: var(--font-display);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-align: center;
        text-transform: uppercase;
      }

      .dog-lidar-pane.has-lidar .dog-lidar-empty {
        display: none;
      }

      .reticle {
        position: absolute;
        inset: 50% auto auto 50%;
        z-index: 3;
        width: 132px;
        height: 132px;
        border: 1px solid oklch(72% 0.11 170 / 0.54);
        border-radius: 50%;
        pointer-events: none;
        translate: -50% -50%;
      }

      .reticle::before,
      .reticle::after {
        position: absolute;
        background: oklch(72% 0.11 170 / 0.58);
        content: "";
      }

      .reticle::before {
        top: 50%;
        left: -26px;
        right: -26px;
        height: 1px;
      }

      .reticle::after {
        top: -26px;
        bottom: -26px;
        left: 50%;
        width: 1px;
      }

      .scan-overlay {
        position: absolute;
        inset: 0;
        z-index: 4;
        pointer-events: none;
        opacity: 0;
        visibility: hidden;
        transition: opacity 140ms ease;
      }

      body.scan-pending .scan-overlay {
        opacity: 1;
        visibility: visible;
      }

      .scan-overlay::before {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        width: 3px;
        background: linear-gradient(
          180deg,
          transparent,
          color-mix(in oklch, var(--accent) 85%, white),
          transparent
        );
        box-shadow:
          0 0 22px color-mix(in oklch, var(--accent) 72%, transparent),
          0 0 68px color-mix(in oklch, var(--accent) 44%, transparent);
        content: "";
        animation: scan-sweep 1.15s linear infinite;
      }

      .scan-overlay::after {
        position: absolute;
        top: var(--space-sm);
        right: var(--space-sm);
        border: 1px solid color-mix(in oklch, var(--accent) 54%, transparent);
        border-radius: 6px;
        padding: 6px 9px;
        background: oklch(10% 0.014 175 / 0.78);
        color: var(--accent);
        content: "SCANNING";
        font-family: var(--font-display);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      @keyframes scan-sweep {
        from {
          left: 0;
          translate: -8px 0;
        }
        to {
          left: 100%;
          translate: 0 0;
        }
      }

      body.dancing .reticle {
        animation: dance-bounce 280ms ease-in-out alternate infinite;
      }

      body.dancing .video-shell {
        animation: dance-glow 480ms ease-in-out alternate infinite;
      }

      @keyframes dance-bounce {
        from {
          scale: 1;
          rotate: -2deg;
        }
        to {
          scale: 1.08;
          rotate: 2deg;
        }
      }

      @keyframes dance-glow {
        from {
          box-shadow: var(--shadow);
        }
        to {
          box-shadow:
            var(--shadow),
            0 0 42px color-mix(in oklch, var(--pink) 34%, transparent);
        }
      }

      .feed-corners {
        position: absolute;
        inset: 14px;
        z-index: 3;
        pointer-events: none;
      }

      .feed-corners::before,
      .feed-corners::after {
        position: absolute;
        width: 44px;
        height: 44px;
        border-color: oklch(72% 0.11 170 / 0.76);
        content: "";
      }

      .feed-corners::before {
        top: 0;
        left: 0;
        border-top: 1px solid;
        border-left: 1px solid;
      }

      .feed-corners::after {
        right: 0;
        bottom: 0;
        border-right: 1px solid;
        border-bottom: 1px solid;
      }

      .video-overlay {
        right: var(--space-sm);
        bottom: var(--space-sm);
        left: var(--space-sm);
        z-index: 4;
        justify-content: space-between;
        gap: var(--space-xs);
      }

      .chip {
        min-height: 30px;
        border: 1px solid oklch(100% 0 0 / 0.12);
        padding: 6px 9px;
        background: oklch(14% 0.014 175 / 0.78);
        color: var(--ink);
        font-family: var(--font-display);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        backdrop-filter: blur(16px);
      }

      .controls {
        grid-template-columns: repeat(2, minmax(0, 190px));
        gap: var(--space-xs);
        padding: var(--space-xs);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: oklch(15.5% 0.015 175 / 0.86);
      }

      button {
        min-height: 44px;
        border-color: var(--line);
        border-radius: 6px;
        background: linear-gradient(180deg, oklch(25% 0.017 175), oklch(18% 0.016 175));
        color: var(--ink);
        font-family: var(--font-display);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        transition:
          border-color 180ms ease,
          background 180ms ease,
          color 180ms ease,
          transform 180ms ease;
      }

      button.bp5-button {
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: linear-gradient(180deg, oklch(25% 0.017 175), oklch(18% 0.016 175));
        box-shadow: none;
        color: var(--ink);
        font-family: var(--font-display);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      button:hover:not(:disabled) {
        border-color: var(--line-strong);
        background: linear-gradient(180deg, oklch(30% 0.02 175), oklch(21% 0.018 175));
        transform: translateY(-1px);
      }

      button.bp5-button:hover:not(:disabled) {
        border-color: var(--line-strong);
        background: linear-gradient(180deg, oklch(30% 0.02 175), oklch(21% 0.018 175));
        color: var(--ink);
      }

      button:active:not(:disabled) {
        transform: translateY(0);
      }

      button.primary {
        border-color: color-mix(in oklch, var(--accent) 72%, black);
        background: linear-gradient(180deg, var(--accent), oklch(54% 0.105 170));

        background: var(--accent);
        box-shadow: 0 0 0 4px color-mix(in oklch, var(--accent) 18%, transparent);
      }

      .status[data-state~="dog-offline"]::before {
        background: var(--amber);
        box-shadow: 0 0 0 4px color-mix(in oklch, var(--amber) 18%, transparent);
      }

      .record-toggle,
      button.bp5-button.record-toggle {
        min-width: 112px;
        min-height: 42px;
        padding: 8px 12px;
        border-color: color-mix(in oklch, var(--pink) 54%, var(--line));
        background:
          linear-gradient(180deg, oklch(100% 0.018 195), color-mix(in oklch, var(--pink) 10%, white)),
          white;
        color: color-mix(in oklch, var(--pink) 62%, var(--ink));
      }

      .record-toggle[data-running="true"],
      button.bp5-button.record-toggle[data-running="true"] {
        background: linear-gradient(180deg, var(--pink), color-mix(in oklch, var(--coral-hot) 64%, var(--pink)));
        color: white;
      }

      .video-shell {
        border-color: color-mix(in oklch, var(--accent) 54%, var(--pink));
        background:
          linear-gradient(180deg, oklch(10% 0.02 230), oklch(8% 0.018 235)),
          oklch(9% 0.018 230);
      }

      .idle-feed {
        position: absolute;
        inset: 0;
        z-index: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: right center;
      }

      body.record3d-mode .idle-feed {
        display: none;
      }

      body.dog-mode .idle-feed {
        display: none;
      }

      body:not(.record3d-mode):not(.dog-mode) video {
        display: none;
      }

      .chip {
        border-color: color-mix(in oklch, var(--accent) 42%, transparent);
        background: oklch(99% 0.014 195 / 0.88);
        color: var(--accent-ink);
      }

      .scan-overlay::before {
        width: 5px;
        background: linear-gradient(180deg, transparent, var(--pink), var(--scanner-green), transparent);
        box-shadow:
          0 0 26px color-mix(in oklch, var(--pink) 68%, transparent),
          0 0 76px color-mix(in oklch, var(--scanner-green) 46%, transparent);
      }

      .scan-overlay::after {
        border-color: color-mix(in oklch, var(--pink) 38%, var(--scanner-green));
        background: oklch(100% 0.012 190 / 0.82);
        color: var(--accent-ink);
      }

      button.bp5-button,
      .photo a.bp5-button {
        border-color: color-mix(in oklch, var(--accent) 34%, var(--line));
        background:
          linear-gradient(180deg, oklch(100% 0.014 195), oklch(96% 0.022 195)),
          white;
        color: var(--ink);
      }

      .photo {
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 8px;
        min-height: 0;
        overflow: hidden;
        padding: 12px 16px;
      }

      .photo .panel-head {
        margin-bottom: 4px;
      }

      .photo-frame {
        aspect-ratio: 1 / 1;
        align-self: start;
        justify-self: center;
        width: 100%;
        height: auto;
        max-width: 100%;
        max-height: 100%;
        overflow: hidden;
        border-color: color-mix(in oklch, var(--accent) 50%, var(--line));
        background: white;
      }

      .photo-frame img {
        object-fit: cover;
        object-position: center;
      }

      .photo-frame::before {
        color: color-mix(in oklch, var(--pink) 54%, var(--accent));
        text-shadow: none;
      }

      .photo-frame::after {
        background: oklch(9% 0.02 230 / 0.74);
        color: color-mix(in oklch, var(--sunset) 50%, white);
      }

      main {
        height: calc(100dvh - 73px);
        padding: 18px 24px 10px;
        overflow: visible;
      }

      aside {
        grid-template-rows: auto auto minmax(0, 1fr);
        overflow: visible;
      }

      .brand {
        gap: 0;
      }

      h1 {
        font-family: var(--font-logo);
        font-size: 42px;
        font-weight: 400;
        letter-spacing: 0;
        line-height: 1;
        color: oklch(99% 0.01 345);
        paint-order: stroke fill;
        -webkit-text-stroke: 0.45px oklch(14% 0.05 305 / 0.78);
        text-shadow:
          0 1px 0 oklch(8% 0.04 305 / 0.86),
          1px 0 0 oklch(8% 0.04 305 / 0.62),
          -1px 0 0 oklch(8% 0.04 305 / 0.48),
          0 0 3px color-mix(in oklch, white 72%, var(--pink)),
          0 0 9px color-mix(in oklch, var(--pink) 82%, white),
          0 0 20px color-mix(in oklch, var(--pink) 72%, transparent),
          0 0 46px color-mix(in oklch, var(--logo-purple) 58%, transparent),
          0 0 82px color-mix(in oklch, var(--pink) 34%, transparent);
      }

      .photo-frame {
        aspect-ratio: 1 / 1.16;
        height: auto;
        max-height: none;
        padding: 16px 16px 68px;
        border: 1px solid oklch(87% 0.035 192);
        border-radius: 4px;
        background:
          linear-gradient(180deg, oklch(99.5% 0.003 195), oklch(97.5% 0.004 195)),
          white;
        box-shadow:
          0 18px 34px oklch(45% 0.06 220 / 0.18),
          0 1px 0 oklch(100% 0 0 / 0.9) inset;
      }

      .photo-frame::before {
        inset: 16px 16px 68px;
        border: 1px solid oklch(90% 0.026 196);
        background: oklch(99% 0.006 195);
        color: color-mix(in oklch, var(--pink) 52%, var(--accent));
      }

      .photo-frame:has(img[src]:not([src=""]))::before {
        display: none;
      }

      .photo-frame img {
        position: relative;
        z-index: 1;
        border: 1px solid oklch(90% 0.026 196);
        background: oklch(99% 0.006 195);
      }

      .photo-frame::after {
        inset: auto 22% 30px;
        height: 1px;
        padding: 0;
        background: color-mix(in oklch, var(--pink) 18%, transparent);
        content: "";
      }

      @media (max-width: 820px) {
        body {
          font-size: 14px;
          height: auto;
          min-height: 100dvh;
          overflow: auto;
        }

        header {
          align-items: flex-start;
          flex-direction: column;
          gap: var(--space-md);
        }

        .header-metrics {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          width: 100%;
        }

        .status {
          grid-column: span 2;
          width: 100%;
        }

        main {
          grid-template-columns: 1fr;
          gap: var(--space-md);
          height: auto;
          padding: var(--space-sm);
          overflow: visible;
        }

        .stage,
        aside {
          grid-template-rows: none;
          overflow: visible;
        }

        .stage-head {
          align-items: flex-start;
          flex-direction: column;
        }

        .video-shell {
          aspect-ratio: 4 / 3;
          height: auto;
          min-height: 280px;
        }

        .controls {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .photo {
          grid-template-rows: auto minmax(220px, auto) auto;
        }
      }

      @media (max-width: 440px) {
        .controls {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .video-shell {
          aspect-ratio: 4 / 3;
          height: auto;
          min-height: 230px;
        }

        .header-metrics {
          grid-template-columns: 1fr;
        }

        .status {
          grid-column: auto;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <h1>Fetch</h1>
      </div>
      <div class="header-metrics" aria-label="System status">
        <div id="status" class="status" data-state="offline">offline</div>
        <button id="recordToggle" class="bp5-button record-toggle" data-running="false">Record</button>
      </div>
    </header>

    <main>
      <div class="stage">
        <div class="stage-head">
          <div>
            <div class="feed-label">Camera feed</div>
            <div class="feed-meta">
              <span class="bp5-icon bp5-icon-eye-open" aria-hidden="true"></span>
              Person availability scan
            </div>
          </div>
          <div class="feed-meta">
            <span class="bp5-icon bp5-icon-satellite" aria-hidden="true"></span>
            <span id="sourceLabel">Record3D RGBD</span>
          </div>
        </div>

        <div class="video-shell">
          <img id="idleFeed" class="idle-feed" src="/fetch/static/idle-camera-feed.png" alt="" />
          <div class="dog-grid" aria-label="Go2 WebRTC camera and LiDAR streams">
            <div class="dog-pane dog-camera-pane">
              <img
                id="dogPreview"
                class="dog-preview"
                src="/fetch/static/idle-camera-feed.png"
                alt="Live Go2 camera feed"
              />
              <span class="stream-label">Camera</span>
            </div>
            <div class="dog-pane dog-lidar-pane">
              <img id="dogLidarPreview" class="dog-lidar-preview" alt="" />
              <span class="stream-label">LiDAR</span>
              <span id="dogLidarEmpty" class="dog-lidar-empty">LiDAR waiting</span>
            </div>
          </div>
          <video id="video" playsinline muted autoplay></video>
          <div class="rgbd-grid" aria-label="Record3D RGB and LiDAR depth streams">
            <div class="rgbd-pane">
              <img id="record3dPreview" class="record3d-preview" alt="" />
              <span class="stream-label">sRGB</span>
            </div>
            <div class="rgbd-pane">
              <img id="depthPreview" class="depth-preview" alt="" />
              <span class="stream-label">LiDAR depth</span>
            </div>
          </div>
          <div id="scanOverlay" class="scan-overlay" aria-hidden="true"></div>
          <div class="feed-corners" aria-hidden="true"></div>
          <div class="reticle" aria-hidden="true"></div>
          <div class="video-overlay">
            <div id="frameRate" class="chip">0 fps</div>
            <div id="motion" class="chip">cmd 0.00 / 0.00</div>
            <div id="rgbdStatus" class="chip">rgbd idle</div>
          </div>
        </div>

        <section class="bp5-card events-panel">
          <div id="log" class="log"></div>
        </section>
      </div>

      <aside>
        <section class="bp5-card">
          <dl>
            <dt>State</dt>
            <dd id="decisionState">idle</dd>
            <dt>Target</dt>
            <dd id="target">none</dd>
            <dt>Evidence</dt>
            <dd id="evidence">none</dd>
            <dt>Offer</dt>
            <dd id="offer">drink + photo</dd>
          </dl>
        </section>

        <section class="bp5-card">
          <p id="line" class="line">Waiting for a good Coke/photo target.</p>
        </section>

        <section class="photo bp5-card">
          <div class="panel-head">
            <h2 class="panel-title">Instant Photo</h2>
          </div>
          <div class="photo-frame">
            <img id="photoPreview" alt="" />
          </div>
          <a id="downloadLink" class="bp5-button bp5-minimal" download="fetch-photo.jpg" hidden>
            <span class="bp5-icon bp5-icon-download" aria-hidden="true"></span>
            Download photo
          </a>
        </section>

      </aside>
    </main>

    <canvas id="canvas" hidden></canvas>
    <audio id="audio"></audio>

    <script>
      const els = {
        status: document.getElementById("status"),
        recordToggle: document.getElementById("recordToggle"),
        video: document.getElementById("video"),
        canvas: document.getElementById("canvas"),
        frameRate: document.getElementById("frameRate"),
        motion: document.getElementById("motion"),
        rgbdStatus: document.getElementById("rgbdStatus"),
        sourceLabel: document.getElementById("sourceLabel"),
        decisionState: document.getElementById("decisionState"),
        target: document.getElementById("target"),
        evidence: document.getElementById("evidence"),
        offer: document.getElementById("offer"),
        line: document.getElementById("line"),
        dogPreview: document.getElementById("dogPreview"),
        dogLidarPreview: document.getElementById("dogLidarPreview"),
        dogLidarEmpty: document.getElementById("dogLidarEmpty"),
        record3dPreview: document.getElementById("record3dPreview"),
        depthPreview: document.getElementById("depthPreview"),
        photoPreview: document.getElementById("photoPreview"),
        downloadLink: document.getElementById("downloadLink"),
        log: document.getElementById("log"),
        audio: document.getElementById("audio"),
      };

      const DOG_PLACEHOLDER_SRC = "/fetch/static/idle-camera-feed.png";
      const SCAN_INTERVAL_MS = 1000;

      const state = {
        ws: null,
        stream: null,
        scanning: false,
        workflow: "find_guest",
        visionSource: "browser",
        pendingFrame: false,
        speaking: false,
        photoInProgress: false,
        frameId: 0,
        lastDecisionAt: 0,
        lastLine: "",
        lastGreetAt: 0,
        lastPhotoAt: 0,
        timer: null,
        statusTimer: null,
        transportStatus: "offline",
        lastDogFrames: 0,
        lastDogLidarFrames: 0,
        dogConnectionActive: false,
        dogCameraStreaming: false,
        dogCameraLive: false,
        dogLidarLive: false,
        lastRecord3dFrames: 0,
        audioContext: null,
      };

      function setStatus(text) {
        state.transportStatus = text;
        renderStatus();
      }

      function setStatusPill(label, stateKey) {
        els.status.textContent = label;
        els.status.dataset.state = stateKey.toLowerCase().replace(/\s+/g, "-");
      }

      function updateRecordAvailability() {
        const disabled = state.visionSource === "dog" && !state.dogCameraStreaming && !state.scanning;
        els.recordToggle.disabled = disabled;
        els.recordToggle.title = disabled ? "Waiting for live Go2 camera frames" : "";
      }

      function renderStatus() {
        if (state.visionSource === "dog") {
          if (state.dogCameraStreaming) {
            setStatusPill("dog live", "connected");
          } else if (state.dogConnectionActive) {
            setStatusPill("dog waiting", "connecting");
          } else {
            setStatusPill("dog offline", "dog offline");
          }
          updateRecordAvailability();
          return;
        }
        setStatusPill(state.transportStatus, state.transportStatus);
        updateRecordAvailability();
      }

      function log(message) {
        const time = new Date().toLocaleTimeString();
        const row = document.createElement("div");
        const stamp = document.createElement("span");
        const body = document.createElement("span");
        row.className = "log-row";
        stamp.className = "log-time";
        body.className = "log-message";
        stamp.textContent = time;
        body.textContent = message;
        row.append(stamp, body);
        els.log.prepend(row);
        while (els.log.children.length > 28) {
          els.log.lastElementChild.remove();
        }
      }

      function setScanPending(pending) {
        state.pendingFrame = pending;
        document.body.classList.toggle("scan-pending", pending);
      }

      function setWorkflow(workflow, message) {
        state.workflow = workflow;
        if (message) {
          els.line.textContent = message;
        }
        log(`workflow ${workflow}`);
      }

      async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 },
          },
          audio: false,
        });
        state.stream = stream;
        els.video.srcObject = state.stream;
        await els.video.play();
        setVisionSource("browser");
        setStatus("camera");
        log("camera ready");
      }

      function connect() {
        if (state.ws && state.ws.readyState === WebSocket.OPEN) {
          setStatus("connected");
          log("socket already open");
          return;
        }
        const scheme = window.location.protocol === "https:" ? "wss" : "ws";
        state.ws = new WebSocket(`${scheme}://${window.location.host}/fetch/ws`);
        setStatus("connecting");
        state.ws.onopen = () => {
          setStatus("connected");
          log("socket open");
          if (state.scanning) {
            sendFrame();
          }
        };
        state.ws.onclose = () => {
          setStatus("offline");
          state.scanning = false;
          setScanPending(false);
          setRunningUi(false);
          log("socket closed");
        };
        state.ws.onerror = () => {
          setStatus("socket error");
          log("socket error");
        };
        state.ws.onmessage = (event) => handleMessage(JSON.parse(event.data));
      }

      function captureDataUrl(maxWidth = 640) {
        const videoWidth = els.video.videoWidth || 1280;
        const videoHeight = els.video.videoHeight || 720;
        const width = Math.min(maxWidth, videoWidth);
        const height = Math.round((width / videoWidth) * videoHeight);
        els.canvas.width = width;
        els.canvas.height = height;
        const ctx = els.canvas.getContext("2d", { alpha: false });
        ctx.drawImage(els.video, 0, 0, width, height);
        return els.canvas.toDataURL("image/jpeg", 0.72);
      }

      function sendFrame() {
        if (!state.scanning || state.pendingFrame) {
          return;
        }
        if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
          return;
        }
        if (state.visionSource === "dog") {
          if (!state.dogCameraStreaming || state.lastDogFrames === 0) {
            log("No live Go2 camera frame received yet");
            return;
          }
          setScanPending(true);
          state.frameId += 1;
          state.ws.send(
            JSON.stringify({
              type: "dog_frame",
              frame_id: state.frameId,
              interaction_phase: state.workflow,
              ts: Date.now(),
            }),
          );
          return;
        }

        if (state.visionSource === "record3d") {
          if (state.lastRecord3dFrames === 0) {
            log("No Record3D frame received yet");
            return;
          }
          setScanPending(true);
          state.frameId += 1;
          state.ws.send(
            JSON.stringify({
              type: "record3d_frame",
              frame_id: state.frameId,
              interaction_phase: state.workflow,
              ts: Date.now(),
            }),
          );
          return;
        }
        if (!els.video.videoWidth) {
          return;
        }

        setScanPending(true);
        state.frameId += 1;
        state.ws.send(
          JSON.stringify({
            type: "frame",
            frame_id: state.frameId,
            image: captureDataUrl(),
            depth_hint: null,
            interaction_phase: state.workflow,
            ts: Date.now(),
          }),
        );
      }

      async function handleMessage(message) {
        if (message.type === "hello") {
          log(`vision ${message.vision_provider || "openai"} ${message.model}`);
          return;
        }
        if (message.type === "error") {
          setScanPending(false);
          if (message.dog) {
            applyDogStatus(message.dog);
          }
          log(message.message);
          return;
        }
        if (message.type !== "decision") {
          return;
        }

        setScanPending(false);
        const now = performance.now();
        const fps = state.lastDecisionAt ? 1000 / (now - state.lastDecisionAt) : 0;
        state.lastDecisionAt = now;
        els.frameRate.textContent = `${fps.toFixed(1)} fps`;

        const cmd = message.simulated_cmd_vel || {};
        els.motion.textContent = `cmd ${(cmd.linear_x || 0).toFixed(2)} / ${(cmd.angular_z || 0).toFixed(2)}`;
        if (message.state === "approach") {
          robotAction({
            action: "move",
            linear_x: cmd.linear_x || 0,
            angular_z: cmd.angular_z || 0,
            duration_s: cmd.duration_s || 0,
          });
        }
        els.decisionState.textContent = message.state || "unknown";
        const target = message.target || {};
        els.target.textContent = `${target.bearing || "unknown"}, ${target.range || "unknown"}: ${target.description || "none"}`;
        els.evidence.textContent = target.free_hand_evidence || "none";
        const offer = message.offer || {};
        els.offer.textContent = [offer.drink ? "drink" : "", offer.photo ? "photo" : ""]
          .filter(Boolean)
          .join(" + ") || "none";

        if (message.line) {
          els.line.textContent = message.line;
        }
        log(`${message.state}/${message.action || "none"}: ${message.notes || ""}`);
        if (message.dog) {
          applyDogStatus(message.dog);
          log(`dog camera ${message.dog.frames_received || 0}, lidar ${message.dog.lidar_frames_received || 0}`);
        }
        if (message.record3d) {
          log(`record3d frames ${message.record3d.frames_received || 0}`);
        }

        if (message.state === "greet" && message.line && state.workflow === "find_guest") {
          await beginOffer(message);
          return;
        }

        if (
          (message.state === "photo_ready" || message.action === "take_photo_dance") &&
          state.workflow === "confirm_bottle"
        ) {
          await completePhoto(message);
          return;
        }

        if (message.state === "wait_for_bottle" && message.line && state.workflow === "confirm_bottle") {
          await speakOnce(message.line, "coached photo pose");
        }
      }

      async function beginOffer(message) {
        const now = Date.now();
        if (now - state.lastGreetAt < 12000 || state.speaking) {
          return;
        }
        state.lastGreetAt = now;
        state.lastLine = message.line;
        els.motion.textContent = "wave";
        await robotAction({ action: "wave" });
        log("wave and Coke-for-photo offer");
        await speakOnce(message.line, "spoke joke and offer");
        setWorkflow("confirm_bottle", "Waiting for the person holding the Coke can up in frame.");
      }

      async function completePhoto(message) {
        const now = Date.now();
        if (now - state.lastPhotoAt < 10000 || state.photoInProgress) {
          return;
        }
        state.lastPhotoAt = now;
        state.photoInProgress = true;
        try {
          const line = message.line || "Hold the Coke can up front and center. Cheers.";
          els.line.textContent = line;
          await speakOnce(line, "spoke cheese cue");
          await snapPhoto();
          await playPrintSound();
          const doneLine = "Photo is done. You can pick it up from my head.";
          els.line.textContent = doneLine;
          await speakOnce(doneLine, "spoke photo pickup cue");
          dance();
          await robotAction({ action: "dance" });
          log("photo saved; dance triggered");
          await sleep(2500);
          setWorkflow("find_guest", "Photo saved. Looking for the next good Coke/photo target.");
        } finally {
          state.photoInProgress = false;
        }
      }

      async function speakOnce(text, successLog) {
        if (!text || state.speaking) {
          return;
        }
        state.speaking = true;
        try {
          await speak(text);
          if (successLog) {
            log(successLog);
          }
        } catch (err) {
          log(`speech ${err.message}`);
        } finally {
          state.speaking = false;
        }
      }

      async function speak(text = els.line.textContent) {
        if (!text) {
          return;
        }
        const response = await fetch("/speak", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        if (!response.ok) {
          log(`speech ${response.status}`);
          return;
        }
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        els.audio.src = url;
        await els.audio.play();
      }

      function getAudioContext() {
        const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextCtor) {
          return null;
        }
        if (!state.audioContext) {
          state.audioContext = new AudioContextCtor();
        }
        return state.audioContext;
      }

      async function playPrintSound() {
        const context = getAudioContext();
        if (!context) {
          return;
        }
        if (context.state === "suspended") {
          await context.resume();
        }

        const start = context.currentTime + 0.03;
        const master = context.createGain();
        master.gain.setValueAtTime(0.0001, start);
        master.gain.exponentialRampToValueAtTime(0.32, start + 0.015);
        master.gain.exponentialRampToValueAtTime(0.0001, start + 1.15);
        master.connect(context.destination);

        const click = context.createOscillator();
        const clickGain = context.createGain();
        click.type = "square";
        click.frequency.setValueAtTime(920, start);
        click.frequency.exponentialRampToValueAtTime(190, start + 0.08);
        clickGain.gain.setValueAtTime(0.45, start);
        clickGain.gain.exponentialRampToValueAtTime(0.0001, start + 0.11);
        click.connect(clickGain).connect(master);
        click.start(start);
        click.stop(start + 0.12);

        for (let index = 0; index < 8; index += 1) {
          const tickStart = start + 0.18 + index * 0.085;
          const tick = context.createOscillator();
          const tickGain = context.createGain();
          tick.type = "triangle";
          tick.frequency.setValueAtTime(index % 2 ? 105 : 130, tickStart);
          tickGain.gain.setValueAtTime(0.16, tickStart);
          tickGain.gain.exponentialRampToValueAtTime(0.0001, tickStart + 0.055);
          tick.connect(tickGain).connect(master);
          tick.start(tickStart);
          tick.stop(tickStart + 0.06);
        }

        const noiseBuffer = context.createBuffer(1, context.sampleRate * 0.72, context.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for (let index = 0; index < data.length; index += 1) {
          data[index] = (Math.random() * 2 - 1) * (1 - index / data.length);
        }
        const noise = context.createBufferSource();
        const noiseFilter = context.createBiquadFilter();
        const noiseGain = context.createGain();
        noise.buffer = noiseBuffer;
        noiseFilter.type = "bandpass";
        noiseFilter.frequency.setValueAtTime(620, start + 0.16);
        noiseFilter.Q.setValueAtTime(0.8, start + 0.16);
        noiseGain.gain.setValueAtTime(0.07, start + 0.16);
        noiseGain.gain.exponentialRampToValueAtTime(0.0001, start + 1.05);
        noise.connect(noiseFilter).connect(noiseGain).connect(master);
        noise.start(start + 0.16);
        noise.stop(start + 1.08);

        log("camera print sound");
        await sleep(1180);
      }

      async function savePhoto(payload) {
        const response = await fetch("/photos/save", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!response.ok) {
          throw new Error(`save photo ${response.status}`);
        }
        return response.json();
      }

      async function snapPhoto() {
        if (state.visionSource === "dog") {
          const saved = await savePhoto({ source: "dog" });
          const url = `${saved.url}?ts=${Date.now()}`;
          els.photoPreview.src = url;
          els.downloadLink.href = url;
          els.downloadLink.hidden = false;
          log(`dog photo saved ${saved.path || ""}`);
          return;
        }
        if (state.visionSource === "record3d") {
          const saved = await savePhoto({ source: "record3d" });
          const url = `${saved.url}?ts=${Date.now()}`;
          els.photoPreview.src = url;
          els.downloadLink.href = url;
          els.downloadLink.hidden = false;
          log(`record3d photo saved ${saved.path || ""}`);
          return;
        }
        if (!els.video.videoWidth) {
          return;
        }
        const dataUrl = captureDataUrl(1024);
        const saved = await savePhoto({ image_data_url: dataUrl });
        const url = `${saved.url}?ts=${Date.now()}`;
        els.photoPreview.src = url;
        els.downloadLink.href = url;
        els.downloadLink.hidden = false;
        log(`photo saved ${saved.path || ""}`);
      }

      function dance() {
        document.body.classList.add("dancing");
        els.motion.textContent = "dance";
        window.setTimeout(() => document.body.classList.remove("dancing"), 1800);
      }

      async function robotAction(payload) {
        try {
          const response = await fetch("/robot/action", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const result = await response.json();
          if (result.enabled === false) {
            return result;
          }
          log(`robot ${payload.action}: ${result.ok ? "ok" : result.message || "failed"}`);
          return result;
        } catch (err) {
          log(`robot ${payload.action} ${err.message}`);
          return { ok: false };
        }
      }

      async function robotPreflight() {
        try {
          const response = await fetch("/robot/preflight", { method: "POST" });
          const result = await response.json();
          if (result.enabled === false) {
            log("robot preflight skipped");
            return result;
          }
          log(`robot preflight: ${result.ok ? "ok" : "failed"}`);
          return result;
        } catch (err) {
          log(`robot preflight ${err.message}`);
          return { ok: false };
        }
      }

      function sourceFromHealth(health) {
        if (health.vision_source) {
          return health.vision_source;
        }
        if (health.dog_enabled || health.robot_enabled) {
          return "dog";
        }
        if (health.record3d_enabled) {
          return "record3d";
        }
        return "browser";
      }

      async function loadHealth() {
        const response = await fetch("/health");
        if (!response.ok) {
          throw new Error(`health ${response.status}`);
        }
        return response.json();
      }

      async function selectVisionSource() {
        const health = await loadHealth();
        const source = sourceFromHealth(health);
        setVisionSource(source);
        return source;
      }

      function refreshDogPreview() {
        if (state.visionSource !== "dog") {
          return;
        }
        state.dogCameraLive = true;
        els.dogPreview.src = `/dog/stream.mjpg?ts=${Date.now()}`;
      }

      function showDogPlaceholder() {
        state.dogCameraLive = false;
        state.dogLidarLive = false;
        els.dogPreview.src = DOG_PLACEHOLDER_SRC;
        els.dogLidarPreview.removeAttribute("src");
        els.dogLidarPreview.hidden = true;
        els.dogLidarPreview.closest(".dog-lidar-pane")?.classList.remove("has-lidar");
      }

      function refreshRecord3dPreview() {
        if (state.visionSource !== "record3d") {
          return;
        }
        els.record3dPreview.src = `/record3d/stream.mjpg?ts=${Date.now()}`;
        els.depthPreview.src = `/record3d/stream-depth.mjpg?ts=${Date.now()}`;
      }

      function setVisionSource(source) {
        state.visionSource = source;
        document.body.classList.toggle("dog-mode", source === "dog");
        document.body.classList.toggle("record3d-mode", source === "record3d");
        els.sourceLabel.textContent =
          source === "dog" ? "Go2 WebRTC" : source === "record3d" ? "Record3D RGBD" : "Local camera";
        renderStatus();

        if (source === "dog") {
          showDogPlaceholder();
        } else if (source === "record3d") {
          refreshRecord3dPreview();
        }
      }

      function applyDogStatus(status) {
        if (!status.enabled) {
          els.rgbdStatus.textContent = "dog off";
          state.dogConnectionActive = false;
          state.dogCameraStreaming = false;
          renderStatus();
          return;
        }

        state.lastDogFrames = status.frames_received || 0;
        state.lastDogLidarFrames = status.lidar_frames_received || 0;
        state.dogConnectionActive = Boolean(status.connected);
        state.dogCameraStreaming = Boolean(status.streaming);
        renderStatus();
        if (state.visionSource === "dog" && state.scanning && status.streaming && !state.dogCameraLive) {
          refreshDogPreview();
        } else if (state.visionSource === "dog" && !status.streaming && state.dogCameraLive) {
          showDogPlaceholder();
        }
        state.dogLidarLive = Boolean(status.lidar_streaming);
        if (state.dogLidarLive && !els.dogLidarPreview.src) {
          els.dogLidarPreview.src = `/dog/lidar-stream.mjpg?ts=${Date.now()}`;
        } else if (!state.dogLidarLive) {
          els.dogLidarPreview.removeAttribute("src");
        }
        els.dogLidarPreview.hidden = !state.dogLidarLive;
        els.dogLidarPreview.closest(".dog-lidar-pane")?.classList.toggle("has-lidar", state.dogLidarLive);
        const cameraStatus = status.streaming
          ? `cam ${state.lastDogFrames}`
          : status.stale
            ? "cam stale"
            : status.waiting_for_frames
              ? "cam waiting"
              : status.last_error
                ? "cam error"
                : "cam idle";
        const lidarStatus = status.lidar_streaming
          ? `lidar ${state.lastDogLidarFrames}`
          : status.lidar_stale
            ? "lidar stale"
            : status.waiting_for_lidar
              ? "lidar waiting"
              : status.lidar_last_error
                ? "lidar error"
                : "lidar idle";
        els.rgbdStatus.textContent = `${cameraStatus} / ${lidarStatus}`;

        if (state.scanning && !status.streaming) {
          els.line.textContent = "Waiting for Go2 WebRTC camera frames.";
        }
      }

      function applyRecord3dStatus(status) {
        if (!status.enabled) {
          els.rgbdStatus.textContent = "rgbd off";
          return;
        }

        state.lastRecord3dFrames = status.frames_received || 0;
        if (status.streaming) {
          els.rgbdStatus.textContent = `rgbd ${state.lastRecord3dFrames}`;
          return;
        }

        if (status.stale) {
          els.rgbdStatus.textContent = "rgbd stale";
          els.line.textContent = "Record3D is connected but the frame stream is stale. Tap Start again, then restart streaming in Record3D if needed.";
          return;
        }

        if (status.waiting_for_frames) {
          els.rgbdStatus.textContent = "rgbd waiting";
          els.line.textContent = "Record3D is connected but not streaming frames. Tap the red streaming toggle in the Record3D app.";
          return;
        }

        els.rgbdStatus.textContent = status.last_error ? "rgbd error" : "rgbd idle";
      }

      async function pollDogStatus() {
        try {
          const response = await fetch("/dog/status");
          applyDogStatus(await response.json());
        } catch (err) {
          els.rgbdStatus.textContent = "dog status error";
        }
      }

      async function pollRecord3dStatus() {
        try {
          const response = await fetch("/record3d/status");
          applyRecord3dStatus(await response.json());
        } catch (err) {
          els.rgbdStatus.textContent = "rgbd status error";
        }
      }

      async function pollVisionStatus() {
        if (state.visionSource === "dog") {
          await pollDogStatus();
        } else if (state.visionSource === "record3d") {
          await pollRecord3dStatus();
        }
      }

      function startVisionStatusPolling() {
        if (state.statusTimer) {
          window.clearInterval(state.statusTimer);
        }
        state.statusTimer = window.setInterval(pollVisionStatus, 1500);
      }

      async function enableDog() {
        const response = await fetch("/dog/status");
        const status = await response.json();
        if (!status.enabled) {
          throw new Error("Go2 camera is not enabled on the server");
        }

        setVisionSource("dog");
        applyDogStatus(status);
        log(`dog enabled, camera ${status.frames_received || 0}, lidar ${status.lidar_frames_received || 0}`);
      }

      async function enableRecord3d() {
        const response = await fetch("/record3d/status");
        const status = await response.json();
        if (!status.enabled) {
          throw new Error("Record3D is not enabled on the server");
        }

        setVisionSource("record3d");
        applyRecord3dStatus(status);
        log(`record3d enabled, frames ${status.frames_received || 0}`);
      }

      async function restartRecord3d() {
        const response = await fetch("/record3d/restart", { method: "POST" });
        const status = await response.json();
        applyRecord3dStatus(status);
        log("record3d receiver restarted");
      }

      function sleep(ms) {
        return new Promise((resolve) => window.setTimeout(resolve, ms));
      }

      async function ensureDogReady() {
        let status = null;
        for (let attempt = 0; attempt < 12; attempt += 1) {
          const response = await fetch("/dog/status");
          status = await response.json();
          if (!status.enabled) {
            throw new Error("Go2 camera is not enabled on the server");
          }
          applyDogStatus(status);
          if (status.streaming) {
            if (!status.lidar_streaming) {
              log("Go2 LiDAR is not streaming yet; continuing with camera only");
            }
            return true;
          }
          await sleep(500);
        }

        const cameraReady = status && status.streaming;
        const lidarReady = status && status.lidar_streaming;
        if (!cameraReady) {
          throw new Error("Go2 WebRTC camera is not streaming yet");
        }
        if (!lidarReady) {
          log("Go2 LiDAR is not streaming yet; continuing with camera only");
        }
        return true;
      }

      async function ensureRecord3dReady() {
        let response = await fetch("/record3d/status");
        let status = await response.json();
        if (!status.enabled) {
          throw new Error("Record3D is not enabled on the server");
        }

        if (status.waiting_for_frames || status.stale || status.last_error || !status.frames_received) {
          await restartRecord3d();
          await sleep(900);
          response = await fetch("/record3d/status");
          status = await response.json();
        }

        applyRecord3dStatus(status);
        if (!status.streaming) {
          log("Waiting for Record3D frames before scanning");
        }
        return status.streaming;
      }

      function setRunningUi(running) {
        els.recordToggle.dataset.running = String(running);
        els.recordToggle.textContent = running ? "Recording" : "Record";
        if (running) {
          setStatus("running");
        } else if (state.ws && state.ws.readyState === WebSocket.OPEN) {
          setStatus("connected");
        } else {
          setStatus("offline");
        }
      }

      async function startAutomation() {
        const source = await selectVisionSource();
        if (source === "dog") {
          await enableDog();
          await ensureDogReady();
          refreshDogPreview();
        } else if (source === "record3d") {
          await enableRecord3d();
          await ensureRecord3dReady();
        } else {
          await startCamera();
        }
        startVisionStatusPolling();
        await robotPreflight();
        if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
          connect();
        }
        state.scanning = true;
        state.workflow = "find_guest";
        setRunningUi(true);
        els.line.textContent = "Standing up, balancing, then looking for a good Coke/photo target.";
        log("auto scan started: every 1s");
        sendFrame();
        if (state.timer) {
          window.clearInterval(state.timer);
        }
        state.timer = window.setInterval(sendFrame, SCAN_INTERVAL_MS);
      }

      function stopAutomation() {
        state.scanning = false;
        state.workflow = "find_guest";
        setScanPending(false);
        if (state.timer) {
          window.clearInterval(state.timer);
          state.timer = null;
        }
        setRunningUi(false);
        if (state.visionSource === "dog") {
          showDogPlaceholder();
        }
        log("auto scan stopped");
      }

      function toggleAutomation() {
        if (state.scanning) {
          stopAutomation();
          return;
        }
        startAutomation().catch((err) => log(err.message));
      }

      async function init() {
        try {
          const source = await selectVisionSource();
          if (source === "dog") {
            connect();
            await pollDogStatus();
            startVisionStatusPolling();
            log("dog mode selected from health");
          } else if (source === "record3d") {
            connect();
            await pollRecord3dStatus();
            startVisionStatusPolling();
            log("record3d mode selected from health");
          } else {
            els.rgbdStatus.textContent = "camera idle";
            log("browser camera mode selected from health");
          }
        } catch (err) {
          log(`init ${err.message}`);
        }
      }

      els.recordToggle.addEventListener("click", toggleAutomation);
      els.photoPreview.addEventListener("error", () => {
        els.photoPreview.removeAttribute("src");
        els.downloadLink.hidden = true;
        log("photo unavailable");
      });
      setRunningUi(false);
      init();
    </script>
  </body>
</html>
